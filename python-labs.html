<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Mastery Hub | Code Craft Academic</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #3776ab; /* Python Blue */
            --secondary: #0f172a;
            --accent: #ffde57; /* Python Gold */
            --bg: #f8fafc;
            --code-bg: #1e293b;
            --white: #ffffff;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar {
            width: 320px; background: var(--secondary); color: white;
            padding: 30px 15px; overflow-y: auto; display: flex;
            flex-direction: column; border-right: 4px solid var(--primary);
        }
        .sidebar h2 { font-size: 1rem; margin-bottom: 25px; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; padding-left: 10px; }
        .lab-list { list-style: none; flex-grow: 1; }
        .lab-item {
            padding: 10px 15px; border-radius: 8px; margin-bottom: 5px;
            cursor: pointer; font-size: 0.8rem; transition: 0.3s;
            color: #94a3b8; border: 1px solid transparent;
        }
        .lab-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .lab-item.active { background: var(--primary); color: white; font-weight: bold; }

        /* MAIN CONTENT */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .header-box { margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; }
        .header-box h1 { font-size: 1.8rem; color: var(--secondary); }
        .tag { display: inline-block; padding: 4px 12px; background: #e0f2fe; border-radius: 20px; font-size: 0.65rem; font-weight: 800; margin-top: 10px; color: var(--primary); }

        /* BRAND BADGES */
        .modern-notice { margin-top: 15px; background: #f0fdf4; border: 1px solid #bbf7d0; padding: 10px 15px; border-radius: 8px; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: #166534; }
        .modern-badge { margin-top: 12px; padding: 8px 15px; background: rgba(16, 185, 129, 0.1); border-radius: 6px; border-left: 4px solid var(--primary); display: inline-flex; align-items: center; gap: 10px; font-size: 0.75rem; color: var(--secondary); }

        /* LOGIC BREAKDOWN */
        .logic-container { margin-bottom: 25px; background: #fffdf0; border: 1px solid #fef08a; border-radius: 12px; overflow: hidden; }
        .logic-header { background: #fef08a; padding: 10px 20px; font-weight: 800; color: #854d0e; font-size: 0.8rem; text-transform: uppercase; }
        .logic-body { padding: 20px; color: #713f12; font-size: 0.9rem; }
        .logic-step { margin-bottom: 12px; display: flex; gap: 10px; align-items: flex-start; }
        .step-num { background: #854d0e; color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; flex-shrink: 0; margin-top: 2px; }

        /* CODE BLOCK */
        .code-container { background: var(--code-bg); border-radius: 12px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .code-header { padding: 12px 20px; background: rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .btn-copy { background: var(--success); color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }

        pre { padding: 25px; color: #e2e8f0; font-family: 'Fira Code', monospace; font-size: 0.85rem; overflow-x: auto; line-height: 1.6; white-space: pre-wrap; }

        @media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; height: 300px; } }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>Python Logic Hub</h2>
        <ul class="lab-list" id="sidebar-list"></ul>
    </aside>

    <main class="main-content">
        <div id="content-display">
            <div class="header-box">
                <span class="tag" id="prog-tag">SECTION: BASIC</span>
                <h1 id="prog-title">Program Title</h1>
                
                <div class="modern-notice">
                    <i class="fas fa-bolt"></i> 
                    <span><b>WebNova Standards:</b> Pythonic code style. Minimal lines, maximum readable logic.</span>
                </div>
                <div class="modern-badge">
                    <i class="fas fa-check-circle"></i>
                    <span><b>Industry Standard:</b> Uses modern f-strings and built-in methods for efficiency.</span>
                </div>
            </div>

            <div class="logic-container">
                <div class="logic-header"><i class="fas fa-brain"></i> System Logic Breakdown</div>
                <div class="logic-body" id="logic-text"></div>
            </div>

            <div class="code-container">
                <div class="code-header">
                    <span style="color: #64748b; font-size: 0.7rem; font-weight: bold;">script.py</span>
                    <button class="btn-copy" onclick="copyCode()"><i class="far fa-copy"></i> Copy Code</button>
                </div>
                <pre id="code-block"></pre>
            </div>
        </div>
    </main>

    <script>
        const labData = {
            p1: { title: "01. Hello World", tag: "BASIC", code: `print("Hello, World!")`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Output:</b> Uses Python's built-in print() function to display text on the console.</p></div>` },
            p2: { title: "02. Basic Arithmetic", tag: "MATH", code: `a, b = 10, 5\nprint(f"Sum: {a+b}, Diff: {a-b}, Prod: {a*b}, Quot: {a/b}")`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Operators:</b> Uses standard +, -, *, and / symbols for mathematical operations.</p></div>` },
            p3: { title: "03. Swap Numbers", tag: "LOGIC", code: `a, b = 5, 10\na, b = b, a\nprint(f"a: {a}, b: {b}")`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Tuple Unpacking:</b> Python allows swapping in one line without a temporary variable.</p></div>` },
            p4: { title: "04. Positive/Negative", tag: "CONDITIONALS", code: `n = int(input("Enter: "))\nif n > 0: print("Positive")\nelif n < 0: print("Negative")\nelse: print("Zero")`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Conditional Branching:</b> Uses if-elif-else to evaluate the state of the number.</p></div>` },
            p5: { title: "05. Max of Three", tag: "MATH", code: `nums = [10, 45, 22]\nprint(f"Max: {max(nums)}")`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Built-in Functions:</b> Utilizes max() to find the highest value in a collection instantly.</p></div>` },
            p6: { title: "06. Leap Year", tag: "LOGIC", code: `y = 2024\nif (y % 400 == 0) or (y % 4 == 0 and y % 100 != 0): print("Leap Year")\nelse: print("Not Leap")`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Boolean Logic:</b> Combines modulo operations to verify century and standard leap rules.</p></div>` },
            p7: { title: "07. Multiplication Table", tag: "LOOPS", code: `n = 5\nfor i in range(1, 11): print(f"{n} x {i} = {n*i}")`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Range Control:</b> range(1, 11) creates a sequence from 1 to 10 for iteration.</p></div>` },
            p8: { title: "08. Factorial", tag: "MATH", code: `import math\nn = 5\nprint(f"Factorial: {math.factorial(n)}")`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Library Import:</b> Uses the math module for optimized mathematical computations.</p></div>` },
            p9: { title: "09. Fibonacci Series", tag: "LOOPS", code: `n, a, b = 10, 0, 1\nfor _ in range(n):\n    print(a, end=" ")\n    a, b = b, a + b`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Iterative Sum:</b> Continuously updates variables to form the sequence (a = b, b = a+b).</p></div>` },
            p10: { title: "10. Sum of Digits", tag: "LOGIC", code: `n = 12345\nprint(sum(int(d) for d in str(n)))`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Generator Expression:</b> Converts to string, iterates digits, and sums them in one line.</p></div>` },
            p11: { title: "11. Reverse Number", tag: "LOGIC", code: `n = 12345\nrev = int(str(n)[::-1])\nprint(rev)`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Slicing:</b> Uses [::-1] string slicing, the fastest way to reverse a sequence in Python.</p></div>` },
            p12: { title: "12. Divisibility Logic", tag: "LOOPS", code: `res = [x for x in range(1500, 2701) if x % 7 == 0 and x % 5 == 0]\nprint(res)`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>List Comprehension:</b> Filters the range efficiently using conditional logic.</p></div>` },
            p13: { title: "13. Temp Converter", tag: "MATH", code: `c = 37\nf = (c * 9/5) + 32\nprint(f"{c}C is {f}F")`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Formula Implementation:</b> Direct application of the algebraic conversion constant.</p></div>` },
            p14: { title: "14. Guessing Game", tag: "INTERACTIVE", code: `import random\ntarget, guess = random.randint(1, 9), 0\nwhile guess != target:\n    guess = int(input("Guess (1-9): "))\nprint("Correct!")`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Randomization:</b> Uses random.randint to set a dynamic target for the while loop.</p></div>` },
            p15: { title: "15. Nested Patterns", tag: "LOOPS", code: `for i in range(1, 6): print("* " * i)`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>String Multiplication:</b> Python allows multiplying strings by integers to repeat characters.</p></div>` },
            p16: { title: "16. Even/Odd Count", tag: "LOOPS", code: `nums = [1, 2, 3, 4, 5, 6]\neven = len([x for x in nums if x % 2 == 0])\nprint(f"Even: {even}, Odd: {len(nums)-even}")`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Modulo Filter:</b> Identifies even numbers via x % 2 == 0 check.</p></div>` },
            p17: { title: "17. ASCII Value", tag: "BASIC", code: `char = 'A'\nprint(f"ASCII of {char} is {ord(char)}")`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Built-in Helper:</b> ord() returns the integer Unicode code point of a character.</p></div>` },
            p18: { title: "18. Palindrome String", tag: "STRINGS", code: `s = "radar"\nif s == s[::-1]: print("Palindrome")\nelse: print("Not")`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Equality Check:</b> Compares the string to its sliced reverse version.</p></div>` },
            p19: { title: "19. String Length", tag: "STRINGS", code: `s, count = "Hello", 0\nfor _ in s: count += 1\nprint(count)`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Manual Iteration:</b> Loops through each character to increment a counter manually.</p></div>` },
            p20: { title: "20. Remove N-th Char", tag: "STRINGS", code: `s, n = "Python", 2\nres = s[:n] + s[n+1:]\nprint(res)`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Slicing concatenation:</b> Joins the parts before and after the index to "cut" the character.</p></div>` }
        };

        function showCode(id, element) {
            document.querySelectorAll('.lab-item').forEach(el => el.classList.remove('active'));
            if (element) element.classList.add('active');
            const data = labData[id];
            document.getElementById('prog-title').innerText = data.title;
            document.getElementById('prog-tag').innerText = "SECTION: " + data.tag;
            document.getElementById('code-block').innerText = data.code;
            document.getElementById('logic-text').innerHTML = data.logic;
        }

        function initSidebar() {
            const list = document.getElementById('sidebar-list');
            Object.keys(labData).forEach((key, index) => {
                const li = document.createElement('li');
                li.className = `lab-item ${index === 0 ? 'active' : ''}`;
                li.innerText = labData[key].title;
                li.onclick = (e) => showCode(key, e.target);
                list.appendChild(li);
            });
        }

        function copyCode() {
            const code = document.getElementById('code-block').innerText;
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector('.btn-copy');
                btn.innerText = "Copied!";
                btn.style.background = "#059669";
                setTimeout(() => {
                    btn.innerHTML = '<i class="far fa-copy"></i> Copy Code';
                    btn.style.background = "#10b981";
                }, 2000);
            });
        }

        window.onload = () => { initSidebar(); showCode('p1', document.querySelector('.lab-item')); };
    </script>
</body>
</html>
