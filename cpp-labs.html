<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --primary: #2563eb; /* C++ Blue */
            --secondary: #0f172a; 
            --accent: #10b981;
            --bg: #f8fafc; 
            --code-bg: #1e293b;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar {
            width: 350px; background: var(--secondary); color: white;
            padding: 25px 15px; overflow-y: auto; display: flex;
            flex-direction: column; border-right: 4px solid var(--primary);
            flex-shrink: 0;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .sidebar h2 { font-size: 1rem; margin-bottom: 20px; color: var(--primary); text-transform: uppercase; padding-left: 10px; }
        .nav-label { font-size: 0.65rem; color: #64748b; font-weight: 800; margin: 15px 0 5px 10px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 3px; }
        
        .lab-list { list-style: none; margin-bottom: 10px; }
        .lab-item {
            padding: 8px 12px; border-radius: 6px; margin-bottom: 2px;
            cursor: pointer; font-size: 0.75rem; color: #94a3b8; transition: 0.2s;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .lab-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .lab-item.active { background: var(--primary); color: white; font-weight: bold; }

        /* CONTENT */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .header-box { margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; }
        .header-box h1 { font-size: 1.8rem; color: var(--secondary); letter-spacing: -0.02em; }
        .tag { display: inline-block; padding: 4px 12px; background: #e2e8f0; border-radius: 20px; font-size: 0.65rem; font-weight: 800; margin-top: 10px; color: var(--secondary); }

        .modern-notice { margin-top: 15px; background: #f0fdf4; border: 1px solid #bbf7d0; padding: 10px 15px; border-radius: 8px; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: #166534; }
        .modern-badge { margin-top: 12px; padding: 8px 15px; background: rgba(37, 99, 235, 0.1); border-radius: 6px; border-left: 4px solid var(--primary); display: inline-flex; align-items: center; gap: 10px; font-size: 0.75rem; color: var(--secondary); }

        /* TWO-COLUMN CONTENT GRID */
        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }

        /* LOGIC BREAKDOWN */
        .logic-container { background: #f0f7ff; border: 1px solid #bae6fd; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; }
        .logic-header { background: #bae6fd; padding: 10px 20px; font-weight: 800; color: #0369a1; font-size: 0.8rem; text-transform: uppercase; margin: -20px -20px 20px -20px; }
        .logic-body { flex-grow: 1; }
        .logic-step { margin-bottom: 8px; display: flex; gap: 10px; font-size: 0.85rem; color: #0c4a6e; align-items: flex-start; }
        .step-num { background: #0369a1; color: white; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; flex-shrink: 0; margin-top: 2px; }

        /* TERMINAL PANEL */
        .terminal-container { background: #020617; border: 1px solid #334155; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .terminal-header { background: #1e293b; padding: 10px 20px; font-weight: 800; color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        .terminal-header .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .terminal-body { padding: 20px; color: #38bdf8; font-family: 'Fira Code', monospace; font-size: 0.85rem; white-space: pre-wrap; line-height: 1.5; flex-grow: 1; }

        /* CODE BLOCK */
        .code-container { background: var(--code-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .code-header { padding: 10px 20px; background: rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .btn-copy { background: var(--accent); color: white; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; transition: 0.2s; }
        .btn-copy:hover { background: #059669; }

        pre { padding: 25px; color: #e2e8f0; font-family: 'Fira Code', monospace; font-size: 0.85rem; overflow-x: auto; line-height: 1.6; white-space: pre-wrap; }

        @media (max-width: 1200px) { .content-grid { grid-template-columns: 1fr; } }
        @media (max-width: 900px) { body { flex-direction: column; overflow: auto; height: auto; } .sidebar { width: 100%; border-right: none; border-bottom: 4px solid var(--primary); height: 350px; } .main-content { overflow: visible; } }
    </style>
</head>

<script>
const labData = {
    "1. BEGINNER BASICS": {
        p1: { title: "01. Hello World", tag: "BASIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "Hello World";\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Standard Output:</b> Uses cout combined with left shift insertion operators to stream strings to stdout.</p></div>`, output: `Hello World` },
        p2: { title: "02. Print Name", tag: "BASIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "WebNova Academy" << endl << "Student Name";\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Stream Line breaks:</b> Employs endl to flush buffers and drop rows sequentially.</p></div>`, output: `WebNova Academy\nStudent Name` },
        p3: { title: "03. Sum of Two", tag: "BASIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a = 10, b = 20;\n    cout << "Sum: " << a + b;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>In-Stream Evaluation:</b> Processes basic math directly inside the standard stream framework.</p></div>`, output: `Sum: 30` },
        p4: { title: "04. Input Product", tag: "BASIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a, b; cin >> a >> b;\n    cout << "Product: " << a * b;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Input Streams:</b> Employs cin with extraction operators (>>) to read terminal data entries into registers.</p></div>`, output: `5 4\nProduct: 20` },
        p5: { title: "05. Type Sizes", tag: "BASIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "int: " << sizeof(int) << "\\nfloat: " << sizeof(float);\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Sizeof operator:</b> Returns exact hardware allocation footprints assigned to datatypes in bytes.</p></div>`, output: `int: 4\nfloat: 4` },
        p6: { title: "06. Swap (3rd Var)", tag: "BASIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a = 5, b = 10, t = a; a = b; b = t;\n    cout << a << " " << b;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Temporary Buffering:</b> Protects value cells using a third reference index during variable swaps.</p></div>`, output: `10 5` },
        p7: { title: "07. Swap (No Var)", tag: "BASIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a = 5, b = 10;\n    a = a + b; b = a - b; a = a - b;\n    cout << a << " " << b;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Mathematical Rotations:</b> Alternates stack properties using sum accumulation rules without additional space.</p></div>`, output: `10 5` },
        p8: { title: "08. Odd or Even", tag: "LOGIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n; cin >> n;\n    if(n % 2 == 0) cout << "Even"; else cout << "Odd";\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Remainder Checks:</b> Utilizes mod operator % to scan for division balance states against zero.</p></div>`, output: `7\nOdd` },
        p9: { title: "09. Leap Year", tag: "LOGIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int y; cin >> y;\n    if(y % 400 == 0 || (y % 4 == 0 && y % 100 != 0)) cout << "Leap";\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Combined Logic Gates:</b> Tests modulo operations using short-circuit logical connectors (||, &&) to track centurial parameters.</p></div>`, output: `2024\nLeap` },
        p10: { title: "10. Largest of Three", tag: "LOGIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a, b, c; cin >> a >> b >> c;\n    if(a >= b && a >= c) cout << a; else if(b >= a && b >= c) cout << b; else cout << c;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Logical Gates:</b> Evaluates numerical attributes against multiple conditional bounds simultaneously.</p></div>`, output: `10 42 17\n42` },
        p11: { title: "11. Quot & Rem", tag: "BASIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a, b; cin >> a >> b;\n    cout << "Q: " << a / b << " R: " << a % b;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Division Operators:</b> Runs separate calculations to output integer quotients and loop remainders cleanly.</p></div>`, output: `13 4\nQ: 3 R: 1` },
        p12: { title: "12. ASCII Value", tag: "BASIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    char c; cin >> c;\n    cout << (int)c;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Explicit Casts:</b> Forces character symbols into integer arrays to extract base ASCII encoding configurations.</p></div>`, output: `A\n65` },
        p13: { title: "13. Float Mult", tag: "MATH", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    float a, b; cin >> a >> b;\n    cout << a * b;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Floating Point math:</b> Multiplies decimal fractions with high IEEE-754 runtime precision.</p></div>`, output: `2.5 1.5\n3.75` },
        p14: { title: "14. Vowel/Consonant", tag: "LOGIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    char c; cin >> c;\n    if(c=='a'||c=='e'||c=='i'||c=='o'||c=='u') cout<<"Vowel"; else cout<<"Consonant";\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Set Intersections:</b> Compares inputs directly against specific character set matches.</p></div>`, output: `e\nVowel` },
        p15: { title: "15. Quadratic Roots", tag: "MATH", code: `#include <iostream>\n#include <cmath>\nusing namespace std;\n\nint main() {\n    float a, b, c, d, r1, r2; cin >> a >> b >> c;\n    d = b * b - 4 * a * c;\n    if(d >= 0) {\n        r1 = (-b + sqrt(d)) / (2 * a);\n        r2 = (-b - sqrt(d)) / (2 * a);\n        cout << r1 << ", " << r2;\n    }\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Algebraic Formulas:</b> Checks discriminants to solve tracking paths for real quadratic roots.</p></div>`, output: `1 -5 6\n3, 2` },
        p16: { title: "16. 1 to N", tag: "LOOPS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n; cin >> n;\n    for(int i = 1; i <= n; i++) cout << i << " ";\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Determined Iteration loops:</b> Uses for statements to advance execution variables until matching bounds are met.</p></div>`, output: `5\n1 2 3 4 5 ` },
        p17: { title: "17. Fibonacci", tag: "LOOPS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n, a = 0, b = 1, c; cin >> n;\n    for(int i = 0; i < n; i++) { cout << a << " "; c = a + b; a = b; b = c; }\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Progressive Summation:</b> Calculates Fibonacci items step-by-step by shifting reference pointers.</p></div>`, output: `4\n0 1 1 2 ` },
        p18: { title: "18. Factorial", tag: "MATH", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n, f = 1; cin >> n;\n    for(int i = 1; i <= n; i++) f *= i;\n    cout << f;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Product Accumulation:</b> Computes cumulative factor calculations safely using localized variable iterations.</p></div>`, output: `5\n120` },
        p19: { title: "19. Prime Factors", tag: "MATH", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n; cin >> n;\n    for(int i = 2; n > 1; i++) while(n % i == 0) { cout << i << " "; n /= i; }\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Structural Reductions:</b> Employs internal while checkpoints to divide targets down to base factors rapidly.</p></div>`, output: `12\n2 2 3 ` },
        p20: { title: "20. Prime Check", tag: "LOGIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n, f = 0; cin >> n;\n    for(int i = 2; i <= n / 2; i++) if(n % i == 0) f = 1;\n    if(f == 0 && n > 1) cout << "Prime"; else cout << "Not";\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Divisibility checks:</b> Loops up to N/2 to monitor factor counts and identify prime numbers.</p></div>`, output: `13\nPrime` },
        p21: { title: "21. GCD & LCM", tag: "MATH", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a, b, t, x, y; cin >> x >> y; a = x; b = y;\n    while(b) { t = b; b = a % b; a = t; }\n    cout << "GCD: " << a << " LCM: " << (x * y) / a;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Euclidean Modulo rules:</b> Reduces values recursively until a clean GCD boundary is located.</p></div>`, output: `12 18\nGCD: 6 LCM: 36` },
        p22: { title: "22. Reverse Num", tag: "LOGIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n, r = 0; cin >> n;\n    while(n) { r = r * 10 + n % 10; n /= 10; }\n    cout << r;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Base-10 Shifts:</b> Extracts integers via remainder splits and stacks them into alternative column variables.</p></div>`, output: `123\n321` },
        p23: { title: "23. Palindrome Check", tag: "LOGIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n, r = 0, t; cin >> n; t = n;\n    while(t) { r = r * 10 + t % 10; t /= 10; }\n    if(r == n) cout << "Yes"; else cout << "No";\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Equivalence Check:</b> Assesses calculated inverted integers against original targets.</p></div>`, output: `121\nYes` },
        p24: { title: "24. Star Triangle", tag: "PATTERNS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    for(int i = 1; i <= 4; i++) { for(int j = 1; j <= i; j++) cout << "* "; cout << "\\n"; }\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Nested Grid loops:</b> Matches loop limits to outer control parameters to build geometric patterns.</p></div>`, output: `* \n* * \n* * * \n* * * * ` },
        p25: { title: "25. Pascal Triangle", tag: "PATTERNS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n = 4, c = 1;\n    for(int i = 0; i < n; i++) {\n        for(int k = 1; k <= n - i; k++) cout << " ";\n        for(int j = 0; j <= i; j++) {\n            if(j == 0 || i == 0) c = 1; else c = c * (i - j + 1) / j;\n            cout << c << " ";\n        } cout << "\\n";\n    } return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Binomial Coefficients:</b> Computes element properties dynamically using current row index combinations.</p></div>`, output: `    1 \n   1 1 \n  1 2 1 \n 1 3 3 1 ` }
    },
    "2. INTERMEDIATE (ARRAYS/POINTERS)": {
        p26: { title: "26. Largest in Array", tag: "ARRAYS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a[] = {1, 5, 3}, n = 3, m = a[0];\n    for(int i = 1; i < n; i++) if(a[i] > m) m = a[i];\n    cout << m; return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Linear Scan framework:</b> Scans across adjacent array targets, shifting tracking flags when higher values appear.</p></div>`, output: `5` },
        p27: { title: "27. 2nd Largest", tag: "ARRAYS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a[] = {1, 5, 3, 9}, n = 4, l = 0, s = 0;\n    for(int i = 0; i < n; i++) if(a[i] > l){ s = l; l = a[i]; } else if(a[i] > s && a[i] != l) s = a[i];\n    cout << s; return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Dual Value Tracking:</b> Manages two tracking benchmarks concurrently to locate second tier values without complete sorts.</p></div>`, output: `5` },
        p28: { title: "28. Sum & Average", tag: "ARRAYS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a[] = {1, 2, 3}, s = 0; for(int i : a) s += i;\n    cout << "Sum: " << s << " Avg: " << s / 3.0;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Range Loops:</b> Iterates safely over elements to build totals without index pointer management.</p></div>`, output: `Sum: 6 Avg: 2` },
        p29: { title: "29. Sort Array", tag: "ARRAYS", code: `#include <iostream>\n#include <algorithm>\nusing namespace std;\n\nint main() {\n    int a[] = {5, 1, 9}, n = 3; sort(a, a + n);\n    for(int i : a) cout << i << " ";\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Introsort Engine:</b> Triggers standard hybrid algorithms (Introsort) to deliver fast sorting performance.</p></div>`, output: `1 5 9 ` },
        p30: { title: "30. Frequency", tag: "ARRAYS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a[] = {1, 2, 1, 3}, k = 1, c = 0;\n    for(int i : a) if(i == k) c++;\n    cout << c; return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Match Scanners:</b> Counts matching occurrences inside datasets using linear iteration paths.</p></div>`, output: `2` },
        p31: { title: "31. Matrix Addition", tag: "ARRAYS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a[2][2] = {{1, 1}, {1, 1}}, b[2][2] = {{2, 2}, {2, 2}}, c[2][2];\n    for(int i = 0; i < 2; i++) for(int j = 0; j < 2; j++) c[i][j] = a[i][j] + b[i][j];\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Coordinate Maps:</b> Aggregates array entries matching nested matrix indices step-by-step.</p></div>`, output: `[Matrix Addition Verified]` },
        p32: { title: "32. Matrix Mult", tag: "ARRAYS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a[2][2] = {{1, 2}, {3, 4}}, b[2][2] = {{5, 6}, {7, 8}}, c[2][2] = {0};\n    for(int i = 0; i < 2; i++) for(int j = 0; j < 2; j++) for(int k = 0; k < 2; k++) c[i][j] += a[i][k] * b[k][j];\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p><b>Dot Products:</b> Processes nested vectors using triple loop structures to derive multiplication fields.</p></div>`, output: `[Matrix Multiplication Verified]` },

function initSidebar() {
    const container = document.getElementById('sidebar-items');
    for (const [group, items] of Object.entries(labData)) {
        const label = document.createElement('div');
        label.className = 'nav-label';
        label.innerText = group;
        container.appendChild(label);

        const ul = document.createElement('ul');
        ul.className = 'lab-list';
        for (const [id, data] of Object.entries(items)) {
            const li = document.createElement('li');
            li.className = 'lab-item';
            li.id = id === 'p1' ? 'default-item' : '';
            li.innerText = data.title;
            li.onclick = (e) => {
                document.querySelectorAll('.lab-item').forEach(el => el.classList.remove('active'));
                li.classList.add('active');
                showCode(data);
            };
            ul.appendChild(li);
        }
        container.appendChild(ul);
    }
}

function showCode(data) {
    document.getElementById('prog-title').innerText = data.title;
    document.getElementById('prog-tag').innerText = "SECTION: " + data.tag;
    document.getElementById('code-block').innerText = data.code;
    document.getElementById('logic-text').innerHTML = data.logic;
    document.getElementById('output-text').innerText = data.output;
}

function copyCode() {
    const code = document.getElementById('code-block').innerText;
    navigator.clipboard.writeText(code).then(() => {
        const btn = document.querySelector('.btn-copy');
        btn.innerText = "Copied!";
        btn.style.background = "#059669";
        setTimeout(() => {
            btn.innerHTML = '<i class="far fa-copy"></i> Copy Code';
            btn.style.background = "#10b981";
        }, 2000);
    });
}

window.onload = () => {
    initSidebar();
    showCode(labData["1. BEGINNER BASICS"]["p1"]);
    document.getElementById('default-item').classList.add('active');
};
</script>
