        p2: { title: "02. Print Name", tag: "BASIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "WebNova Academy" << endl << "Student Name";\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Using endl for line separation.</p></div>` },
        p3: { title: "03. Sum of Two", tag: "BASIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a=10, b=20;\n    cout << "Sum: " << a+b;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Simple arithmetic addition.</p></div>` },
        p4: { title: "04. Input Product", tag: "BASIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a, b; cin >> a >> b;\n    cout << "Product: " << a*b;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Extraction operator (>>) for input.</p></div>` },
        p5: { title: "05. Type Sizes", tag: "BASIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "int: " << sizeof(int) << "\\nfloat: " << sizeof(float);\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>sizeof() returns memory in bytes.</p></div>` },
        p6: { title: "06. Swap (3rd Var)", tag: "BASIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a=5, b=10, t=a; a=b; b=t;\n    cout << a << " " << b;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Using a temporary buffer variable.</p></div>` },
        p7: { title: "07. Swap (No Var)", tag: "BASIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a=5, b=10;\n    a=a+b; b=a-b; a=a-b;\n    cout << a << " " << b;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Arithmetic rotation swap.</p></div>` },
        p8: { title: "08. Odd or Even", tag: "LOGIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n; cin >> n;\n    if(n%2==0) cout << "Even"; else cout << "Odd";\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Modulo check for remainder 0.</p></div>` },
        p9: { title: "09. Leap Year", tag: "LOGIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int y; cin >> y;\n    if(y%400==0 || (y%4==0 && y%100!=0)) cout << "Leap";\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Century and standard leap rules.</p></div>` },
        p10: { title: "10. Largest of Three", tag: "LOGIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a,b,c; cin>>a>>b>>c;\n    if(a>=b && a>=c) cout<<a; else if(b>=a && b>=c) cout<<b; else cout<<c;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Logical AND (&&) comparisons.</p></div>` },
        p11: { title: "11. Quot & Rem", tag: "BASIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a,b; cin>>a>>b;\n    cout << "Q: " << a/b << " R: " << a%b;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Standard division and modulo.</p></div>` },
        p12: { title: "12. ASCII Value", tag: "BASIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    char c; cin >> c;\n    cout << (int)c;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Type casting char to int.</p></div>` },
        p13: { title: "13. Float Mult", tag: "MATH", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    float a,b; cin>>a>>b;\n    cout << a*b;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Decimal precision multiplication.</p></div>` },
        p14: { title: "14. Vowel/Consonant", tag: "LOGIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    char c; cin>>c;\n    if(c=='a'||c=='e'||c=='i'||c=='o'||c=='u') cout<<"Vowel"; else cout<<"Consonant";\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Character comparison logic.</p></div>` },
        p15: { title: "15. Quadratic Roots", tag: "MATH", code: `#include <iostream>\n#include <cmath>\nusing namespace std;\n\nint main() {\n    float a,b,c,d,r1,r2; cin>>a>>b>>c;\n    d=b*b-4*a*c;\n    if(d>=0){ r1=(-b+sqrt(d))/(2*a); cout<<r1<<", "<<r2; }\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Discriminant based root formula.</p></div>` },
        p16: { title: "16. 1 to N", tag: "LOOPS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n; cin>>n;\n    for(int i=1; i<=n; i++) cout<<i<<" ";\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Iterative sequence printing.</p></div>` },
        p17: { title: "17. Fibonacci", tag: "LOOPS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n, a=0, b=1, c; cin>>n;\n    for(int i=0; i<n; i++){ cout<<a<<" "; c=a+b; a=b; b=c; }\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Summing previous two terms.</p></div>` },
        p18: { title: "18. Factorial", tag: "MATH", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n, f=1; cin>>n;\n    for(int i=1; i<=n; i++) f*=i;\n    cout<<f;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Accumulative multiplication loop.</p></div>` },
        p19: { title: "19. Prime Factors", tag: "MATH", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n; cin>>n;\n    for(int i=2; n>1; i++) while(n%i==0){ cout<<i<<" "; n/=i; }\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Nested while for factor reduction.</p></div>` },
        p20: { title: "20. Prime Check", tag: "LOGIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n, f=0; cin>>n;\n    for(int i=2; i<=n/2; i++) if(n%i==0) f=1;\n    if(f==0) cout<<"Prime";\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Divisibility check up to N/2.</p></div>` },
        p21: { title: "21. GCD & LCM", tag: "MATH", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a,b,t,x,y; cin>>x>>y; a=x; b=y;\n    while(b){ t=b; b=a%b; a=t; }\n    cout<<"GCD: "<<a<<" LCM: "<<(x*y)/a;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Euclidean algorithm for GCD.</p></div>` },
        p22: { title: "22. Reverse Num", tag: "LOGIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n, r=0; cin>>n;\n    while(n){ r=r*10+n%10; n/=10; }\n    cout<<r;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Modulo and multiplication shift.</p></div>` },
        p23: { title: "23. Palindrome Check", tag: "LOGIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n,r=0,t; cin>>n; t=n;\n    while(t){ r=r*10+t%10; t/=10; }\n    if(r==n) cout<<"Yes";\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Equality of reversed number.</p></div>` },
        p24: { title: "24. Star Triangle", tag: "PATTERNS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    for(int i=1; i<=5; i++){ for(int j=1; j<=i; j++) cout<<"* "; cout<<"\\n"; }\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Nested loop row-column control.</p></div>` },
        p25: { title: "25. Pascal Triangle", tag: "PATTERNS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n=5, c=1; \n    for(int i=0; i<n; i++) {\n        for(int k=1; k<=n-i; k++) cout<<" ";\n        for(int j=0; j<=i; j++) {\n            if(j==0||i==0) c=1; else c=c*(i-j+1)/j;\n            cout<<c<<" ";\n        } cout<<"\\n";\n    } return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Binomial coefficient logic.</p></div>` }
    },
    "2. INTERMEDIATE (ARRAYS/POINTERS)": {
        p26: { title: "26. Largest in Array", tag: "ARRAYS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a[]={1,5,3}, n=3, m=a[0];\n    for(int i=1; i<n; i++) if(a[i]>m) m=a[i];\n    cout<<m;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Linear scan comparison.</p></div>` },
        p27: { title: "27. 2nd Largest", tag: "ARRAYS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a[]={1,5,3,9}, n=4, l=0, s=0;\n    for(int i=0; i<n; i++) if(a[i]>l){ s=l; l=a[i]; } else if(a[i]>s && a[i]!=l) s=a[i];\n    cout<<s;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Track two champions simultaneously.</p></div>` },
        p28: { title: "28. Sum & Average", tag: "ARRAYS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a[]={1,2,3}, s=0; for(int i:a) s+=i;\n    cout<<"Sum: "<<s<<" Avg: "<<s/3.0;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Range-based loop accumulation.</p></div>` },
        p29: { title: "29. Sort Array", tag: "ARRAYS", code: `#include <iostream>\n#include <algorithm>\nusing namespace std;\n\nint main() {\n    int a[]={5,1,9}, n=3; sort(a, a+n);\n    for(int i:a) cout<<i<<" ";\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>STL Sort optimization.</p></div>` },
        p30: { title: "30. Frequency", tag: "ARRAYS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a[]={1,2,1,3}, k=1, c=0;\n    for(int i:a) if(i==k) c++;\n    cout<<c;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Count occurrences of K.</p></div>` },
        p31: { title: "31. Matrix Addition", tag: "ARRAYS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a[2][2]={1,1,1,1}, b[2][2]={2,2,2,2}, c[2][2];\n    for(int i=0; i<2; i++) for(int j=0; j<2; j++) c[i][j]=a[i][j]+b[i][j];\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Cell-wise addition.</p></div>` },
        p32: { title: "32. Matrix Mult", tag: "ARRAYS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a[2][2]={1,2,3,4}, b[2][2]={5,6,7,8}, c[2][2]={0};\n    for(int i=0; i<2; i++) for(int j=0; j<2; j++) for(int k=0; k<2; k++) c[i][j]+=a[i][k]*b[k][j];\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Triple loop dot product.</p></div>` },
        p33: { title: "33. Str Length", tag: "STRINGS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    char s[]="WebNova"; int l=0; while(s[l]) l++;\n    cout<<l;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Null terminator loop.</p></div>` },
        p34: { title: "34. Concatenate", tag: "STRINGS", code: `#include <iostream>\n#include <string>\nusing namespace std;\n\nint main() {\n    string s1="Hi ", s2="WebNova";\n    cout<<s1+s2;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>String operator overloading.</p></div>` },
        p35: { title: "35. Reverse String", tag: "STRINGS", code: `#include <iostream>\n#include <algorithm>\n#include <string>\nusing namespace std;\n\nint main() {\n    string s="Nova"; reverse(s.begin(), s.end());\n    cout<<s;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>STL reverse iterator.</p></div>` },
        p36: { title: "36. String Palindrome", tag: "STRINGS", code: `#include <iostream>\n#include <string>\n#include <algorithm>\nusing namespace std;\n\nint main() {\n    string s="radar", t=s; reverse(t.begin(), t.end());\n    if(s==t) cout<<"Yes";\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Compare string to reversed copy.</p></div>` },
        p37: { title: "37. Count V/C/D", tag: "STRINGS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    string s="Nova1"; int v=0,c=0,d=0;\n    for(char i:s){ if(isdigit(i)) d++; else v++; }\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Character classification loop.</p></div>` },
        p38: { title: "38. Array Pointers", tag: "POINTERS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a[]={1,2}, *p=a; cout<<*p<<" "<<*(p+1);\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Pointer arithmetic offset.</p></div>` },
        p39: { title: "39. Swap Pointers", tag: "POINTERS", code: `#include <iostream>\nusing namespace std;\n\nvoid swap(int *a, int *b){ int t=*a; *a=*b; *b=t; }\nint main() {\n    int x=5, y=10; swap(&x, &y);\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Pass by address logic.</p></div>` },
        p40: { title: "40. Student Struct", tag: "STRUCT", code: `#include <iostream>\nusing namespace std;\n\nstruct Student { string n; int r; float m; };\nint main() {\n    Student s = {"Alex", 1, 85.5};\n    cout<<s.n;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Grouping heterogeneous data.</p></div>` },
        p41: { title: "41. Dynamic Array", tag: "MEMORY", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int *a = new int[5]; delete[] a;\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Heap allocation/deallocation.</p></div>` },
        p42: { title: "42. 2D Array Pointers", tag: "POINTERS", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a[2][2]={1,2,3,4}; int (*p)[2]=a;\n    cout<<p[0][0];\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Pointer to array of size N.</p></div>` },

        p44: { title: "44. Menu Calc", tag: "LOGIC", code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int op; cin>>op; switch(op){ case 1: cout<<"Add"; break; }\n    return 0;\n}`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Switch-case menu logic.</p></div>` },
        p45: { title: "45. Dec to Binary", tag: "MATH", code: `#include <iostream>\nusing namespace std;\n\nvoid bin(int n){ if(n>1) bin(n/2); cout<<n%2; }\nint main() { bin(10); return 0; }`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Recursive base-2 conversion.</p></div>` }

        p47: { title: "47. Constructor Overload", tag: "OOP", code: `#include <iostream>\nusing namespace std;\n\nclass Box { public: Box(){cout<<"A";} Box(int s){cout<<s;} };\nint main(){ Box b1; Box b2(5); }`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Static polymorphism.</p></div>` },
        p48: { title: "48. Destructors", tag: "OOP", code: `#include <iostream>\nusing namespace std;\n\nclass X { public: ~X(){cout<<"Gone";} };\nint main(){ X obj; }`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Automatic cleanup call.</p></div>` },
        p49: { title: "49. Friend Function", tag: "OOP", code: `#include <iostream>\nusing namespace std;\n\nclass A { int x=10; friend void show(A); };\nvoid show(A obj){ cout<<obj.x; }\nint main(){ A o; show(o); }`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Accessing private members.</p></div>` },
        p50: { title: "50. Single Inheritance", tag: "OOP", code: `#include <iostream>\nusing namespace std;\n\nclass P { public: void f(){cout<<"P";} };\nclass C : public P {};\nint main(){ C obj; obj.f(); }`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Parent-child feature sharing.</p></div>` },
        p51: { title: "51. Multi Inheritance", tag: "OOP", code: `#include <iostream>\nusing namespace std;\n\nclass A {}; class B {}; class C : public A, public B {};\nint main(){ C obj; }`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Merging multiple bases.</p></div>` },
        p52: { title: "52. Func Overloading", tag: "OOP", code: `#include <iostream>\nusing namespace std;\n\nvoid f(int i){cout<<i;} void f(double d){cout<<d;}\nint main(){ f(5); f(5.5); }`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Compile-time signatures.</p></div>` },
        p53: { title: "53. Operator Overload", tag: "OOP", code: `#include <iostream>\nusing namespace std;\n\nclass C { public: int r; C operator+(C o){ C t; t.r=r+o.r; return t; } };\nint main(){ C c1,c2,c3; c1.r=1; c2.r=2; c3=c1+c2; }`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Defining + for objects.</p></div>` },
        p54: { title: "54. Virtual Functions", tag: "OOP", code: `#include <iostream>\nusing namespace std;\n\nclass B { public: virtual void s(){cout<<"B";} };\nclass D : public B { public: void s(){cout<<"D";} };\nint main(){ B *p; D obj; p=&obj; p->s(); }`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Runtime dynamic binding.</p></div>` },
        p55: { title: "55. Abstract Class", tag: "OOP", code: `#include <iostream>\nusing namespace std;\n\nclass S { public: virtual void draw()=0; };\nclass C : public S { public: void draw(){cout<<"C";} };\nint main(){ C obj; obj.draw(); }`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Pure virtual function rules.</p></div>` },

        p57: { title: "57. Exceptions", tag: "OOP", code: `#include <iostream>\nusing namespace std;\n\nint main(){ try{ throw 5; } catch(int e){ cout<<e; } }`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Runtime error trapping.</p></div>` },
        p58: { title: "58. STL Vector", tag: "STL", code: `#include <iostream>\n#include <vector>\nusing namespace std;\n\nint main(){ vector<int> v={1,2}; v.push_back(3); cout<<v.size(); }`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Dynamic growth array.</p></div>` },

        p65: { title: "65. Bank Project", tag: "PROJECT", code: `#include <iostream>\nusing namespace std;\n\nclass Bank { float b=0; public: void d(float a){b+=a;} void s(){cout<<b;} };\nint main(){ Bank u; u.d(500); u.s(); }`, logic: `<div class="logic-step"><div class="step-num">1</div><p>Private data management.</p></div>` }
    }
};

function initSidebar() {
    const container = document.getElementById('sidebar-items');
    for (const [group, items] of Object.entries(labData)) {
        const label = document.createElement('div');
        label.className = 'nav-label';
        label.innerText = group;
        container.appendChild(label);

        const ul = document.createElement('ul');
        ul.className = 'lab-list';
        for (const [id, data] of Object.entries(items)) {
            const li = document.createElement('li');
            li.className = 'lab-item';
            li.innerText = data.title;
            li.onclick = (e) => {
                document.querySelectorAll('.lab-item').forEach(el => el.classList.remove('active'));
                li.classList.add('active');
                showCode(data);
            };
            ul.appendChild(li);
        }
        container.appendChild(ul);
    }
}

function showCode(data) {
    document.getElementById('prog-title').innerText = data.title;
    document.getElementById('prog-tag').innerText = "SECTION: " + data.tag;
    document.getElementById('code-block').innerText = data.code;
    document.getElementById('logic-text').innerHTML = data.logic;
}

function copyCode() {
    navigator.clipboard.writeText(document.getElementById('code-block').innerText).then(() => alert("Copied!"));
}

window.onload = () => {
    initSidebar();
    const firstGroup = Object.keys(labData)[0];
    const firstProg = Object.values(labData[firstGroup])[0];
    showCode(firstProg);
    document.querySelector('.lab-item').classList.add('active');
};
</script>
