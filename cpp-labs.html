<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Practical Hub | Code Craft Academic</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb; /* C++ Royal Blue */
            --secondary: #0f172a;
            --accent: #10b981;
            --bg: #f8fafc;
            --code-bg: #1e293b;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar {
            width: 300px;
            background: var(--secondary);
            color: white;
            padding: 30px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            border-right: 4px solid var(--primary);
        }

        .sidebar h2 { font-size: 1.1rem; margin-bottom: 25px; color: var(--primary); letter-spacing: 1px; text-transform: uppercase; }
        
        .lab-list { list-style: none; flex-grow: 1; }
        .lab-item {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
            color: #94a3b8;
        }

        .lab-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .lab-item.active { background: var(--primary); color: white; font-weight: bold; }

        .sidebar-footer {
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 20px;
        }

        .btn-download-pdf {
            display: block;
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn-download-pdf:hover { background: #1d4ed8; transform: translateY(-2px); }

        /* MAIN CONTENT AREA */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        
        .header-box { margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; }
        .header-box h1 { font-size: 2rem; color: var(--secondary); }
        .tag { display: inline-block; padding: 4px 12px; background: #e2e8f0; border-radius: 20px; font-size: 0.7rem; font-weight: 800; margin-top: 10px; color: var(--secondary); }

        /* LOGIC BREAKDOWN */
        .logic-container {
            margin-bottom: 25px;
            background: #f0f7ff; /* Light Blue tint */
            border: 1px solid #bae6fd;
            border-radius: 12px;
            overflow: hidden;
        }

        .logic-header {
            background: #bae6fd;
            padding: 10px 20px;
            font-weight: 800;
            color: #0369a1;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .logic-body { padding: 20px; color: #0c4a6e; font-size: 0.9rem; }
        .logic-step { margin-bottom: 8px; display: flex; gap: 10px; align-items: flex-start; }
        .step-num {
            background: #0369a1; color: white; width: 20px; height: 20px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; flex-shrink: 0; margin-top: 2px;
        }

        /* CODE BLOCK */
        .code-container {
            background: var(--code-bg);
            border-radius: 12px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .code-header {
            padding: 12px 20px;
            background: rgba(255,255,255,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px 12px 0 0;
        }

        .btn-copy {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            transition: 0.3s;
        }

        pre {
            padding: 25px;
            color: #e2e8f0;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>C++ Practical Hub</h2>
        <ul class="lab-list">
            <li class="lab-item active" id="default-item" onclick="showCode('cpp1')">01. Hello World</li>
            <li class="lab-item" onclick="showCode('cpp2')">02. Sum of Two Numbers</li>
            <li class="lab-item" onclick="showCode('cpp3')">03. Even or Odd Check</li>
            <li class="lab-item" onclick="showCode('cpp4')">04. Largest of Three</li>
            <li class="lab-item" onclick="showCode('cpp5')">05. Classes & Objects</li>
        </ul>

        <div class="sidebar-footer">
            <a href="assets/pdf/CPP-Lab-Manual-WebNova.pdf" download class="btn-download-pdf">
                <i class="fas fa-file-download"></i> Download PDF Manual
            </a>
        </div>
    </aside>

    <main class="main-content">
        <div id="content-display">
            <div class="header-box">
                <span class="tag">C++ BEGINNER LEVEL</span>
                <h1 id="prog-title">Program Title</h1>
            </div>

            <div class="logic-container">
                <div class="logic-header"><i class="fas fa-brain"></i> System Logic Mastery</div>
                <div class="logic-body" id="logic-text"></div>
            </div>

            <div class="code-container">
                <div class="code-header">
                    <span style="color: #64748b; font-size: 0.75rem; font-weight: bold;">source.cpp</span>
                    <button class="btn-copy" onclick="copyCode()"><i class="far fa-copy"></i> Copy Code</button>
                </div>
                <pre id="code-block"></pre>
            </div>
        </div>
    </main>

    <script>
        const labData = {
            cpp1: {
                title: "Hello World",
                tag: "CPP PROGRAM 01",
                code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "Hello, WebNova Academy!";\n    return 0;\n}`,
                logic: `
                    <div class="logic-step"><div class="step-num">1</div><p><b>Streams:</b> We use &lt;iostream&gt; instead of stdio.h for modern C++ streams.</p></div>
                    <div class="logic-step"><div class="step-num">2</div><p><b>Namespace:</b> std namespace prevents us from typing std:: before every command.</p></div>
                    <div class="logic-step"><div class="step-num">3</div><p><b>Insertion:</b> The &lt;&lt; operator "inserts" the text into the output stream.</p></div>`
            },
            cpp2: {
                title: "Sum of Two Numbers",
                tag: "CPP PROGRAM 02",
                code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int num1, num2, sum;\n    cout << "Enter first number: ";\n    cin >> num1;\n    cout << "Enter second number: ";\n    cin >> num2;\n    sum = num1 + num2;\n    cout << "Result: " << sum << endl;\n    return 0;\n}`,
                logic: `
                    <div class="logic-step"><div class="step-num">1</div><p><b>Extraction:</b> 'cin' extracts data from the user and stores it in variables.</p></div>
                    <div class="logic-step"><div class="step-num">2</div><p><b>Calculation:</b> Standard arithmetic operators function just like in C.</p></div>
                    <div class="logic-step"><div class="step-num">3</div><p><b>Formatting:</b> 'endl' is used to insert a new line and flush the buffer.</p></div>`
            },
            cpp3: {
                title: "Even or Odd Check",
                tag: "CPP PROGRAM 03",
                code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int n;\n    cout << "Enter a number: ";\n    cin >> n;\n    if (n % 2 == 0) {\n        cout << n << " is Even.";\n    } else {\n        cout << n << " is Odd.";\n    }\n    return 0;\n}`,
                logic: `
                    <div class="logic-step"><div class="step-num">1</div><p><b>Modulus:</b> '%' finds the remainder. If remainder is 0, the number is even.</p></div>
                    <div class="logic-step"><div class="step-num">2</div><p><b>Branching:</b> If/Else logic manages the program flow based on the condition.</p></div>`
            },
            cpp4: {
                title: "Largest of Three Numbers",
                tag: "CPP PROGRAM 04",
                code: `#include <iostream>\nusing namespace std;\n\nint main() {\n    int a, b, c;\n    cout << "Enter 3 numbers: ";\n    cin >> a >> b >> c;\n    if(a >= b && a >= c) cout << a << " is largest";\n    else if(b >= a && b >= c) cout << b << " is largest";\n    else cout << c << " is largest";\n    return 0;\n}`,
                logic: `
                    <div class="logic-step"><div class="step-num">1</div><p><b>Logical AND:</b> '&&' ensures both comparisons are true before picking a winner.</p></div>
                    <div class="logic-step"><div class="step-num">2</div><p><b>Efficiency:</b> Using 'else if' prevents unnecessary checks once the largest is found.</p></div>`
            },
            cpp5: {
                title: "Classes & Objects",
                tag: "CPP PROGRAM 05",
                code: `#include <iostream>\nusing namespace std;\n\nclass Car {\n  public:\n    string brand;\n    void start() {\n      cout << brand << " engine started!";\n    }\n};\n\nint main() {\n    Car myObj;\n    myObj.brand = "Tesla";\n    myObj.start();\n    return 0;\n}`,
                logic: `
                    <div class="logic-step"><div class="step-num">1</div><p><b>Class:</b> A blueprint for creating objects (Data + Functions).</p></div>
                    <div class="logic-step"><div class="step-num">2</div><p><b>Access Specifier:</b> 'public' allows access from outside the class.</p></div>
                    <div class="logic-step"><div class="step-num">3</div><p><b>Object:</b> 'myObj' is a real-world instance of the 'Car' class.</p></div>`
            }
        };

        function showCode(id) {
            document.querySelectorAll('.lab-item').forEach(el => el.classList.remove('active'));
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            } else {
                document.getElementById('default-item').classList.add('active');
            }

            document.getElementById('prog-title').innerText = labData[id].title;
            document.querySelector('.tag').innerText = labData[id].tag;
            document.getElementById('code-block').innerText = labData[id].code;
            document.getElementById('logic-text').innerHTML = labData[id].logic;
        }

        window.onload = function() {
            showCode('cpp1');
        };

        function copyCode() {
            const code = document.getElementById('code-block').innerText;
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector('.btn-copy');
                btn.innerText = "Copied!";
                btn.style.background = "#059669";
                setTimeout(() => {
                    btn.innerHTML = '<i class="far fa-copy"></i> Copy Code';
                    btn.style.background = "#10b981";
                }, 2000);
            });
        }
    </script>
</body>
</html>
