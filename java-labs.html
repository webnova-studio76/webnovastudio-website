<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Practical Hub | Code Craft Academic</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #f89820; /* Java Orange */
            --secondary: #0f172a;
            --accent: #10b981;
            --bg: #f8fafc;
            --code-bg: #1e293b;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar {
            width: 300px;
            background: var(--secondary);
            color: white;
            padding: 30px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            border-right: 4px solid var(--primary);
        }

        .sidebar h2 { font-size: 1.1rem; margin-bottom: 25px; color: var(--primary); letter-spacing: 1px; text-transform: uppercase; }
        
        .lab-list { list-style: none; flex-grow: 1; }
        .lab-item {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
            color: #94a3b8;
        }

        .lab-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .lab-item.active { background: var(--primary); color: white; font-weight: bold; }

        .sidebar-footer {
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 20px;
        }

        .btn-download-pdf {
            display: block;
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        /* MAIN CONTENT AREA */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        
        .header-box { margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; }
        .header-box h1 { font-size: 2rem; color: var(--secondary); }
        .tag { display: inline-block; padding: 4px 12px; background: #ffeeda; border-radius: 20px; font-size: 0.7rem; font-weight: 800; margin-top: 10px; color: var(--primary); }

        /* LOGIC BREAKDOWN */
        .logic-container {
            margin-bottom: 25px;
            background: #fffaf5; 
            border: 1px solid #fed7aa;
            border-radius: 12px;
            overflow: hidden;
        }

        .logic-header {
            background: #fed7aa;
            padding: 10px 20px;
            font-weight: 800;
            color: #9a3412;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .logic-body { padding: 20px; color: #431407; font-size: 0.9rem; }
        .logic-step { margin-bottom: 8px; display: flex; gap: 10px; align-items: flex-start; }
        .step-num {
            background: #9a3412; color: white; width: 20px; height: 20px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; flex-shrink: 0; margin-top: 2px;
        }

        /* CODE BLOCK */
        .code-container {
            background: var(--code-bg);
            border-radius: 12px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .code-header {
            padding: 12px 20px;
            background: rgba(255,255,255,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px 12px 0 0;
        }

        .btn-copy {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
        }

        pre {
            padding: 25px;
            color: #e2e8f0;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>Java Enterprise Hub</h2>
        <ul class="lab-list">
            <li class="lab-item active" id="default-item" onclick="showCode('java1')">01. Hello Java</li>
            <li class="lab-item" onclick="showCode('java2')">02. User Input (Scanner)</li>
            <li class="lab-item" onclick="showCode('java3')">03. Factorial (Recursion)</li>
            <li class="lab-item" onclick="showCode('java4')">04. Method Overloading</li>
            <li class="lab-item" onclick="showCode('java5')">05. Inheritance Logic</li>
        </ul>

        <div class="sidebar-footer">
            <a href="assets/pdf/Java-Lab-Manual.pdf" download class="btn-download-pdf">
                <i class="fas fa-file-download"></i> Download Java PDF
            </a>
        </div>
    </aside>

    <main class="main-content">
        <div id="content-display">
            <div class="header-box">
                <span class="tag">JAVA CORE LEVEL</span>
                <h1 id="prog-title">Program Title</h1>
            </div>

            <div class="logic-container">
                <div class="logic-header"><i class="fas fa-brain"></i> Logic Mastery Breakdown</div>
                <div class="logic-body" id="logic-text"></div>
            </div>

            <div class="code-container">
                <div class="code-header">
                    <span style="color: #64748b; font-size: 0.75rem; font-weight: bold;">Main.java</span>
                    <button class="btn-copy" onclick="copyCode()"><i class="far fa-copy"></i> Copy Code</button>
                </div>
                <pre id="code-block"></pre>
            </div>
        </div>
    </main>

    <script>
        const labData = {
            java1: {
                title: "Hello Java",
                tag: "JAVA PROGRAM 01",
                code: `public class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello, Code Craft Academy!");\n    }\n}`,
                logic: `
                    <div class="logic-step"><div class="step-num">1</div><p><b>Class:</b> In Java, every line of code must be inside a class.</p></div>
                    <div class="logic-step"><div class="step-num">2</div><p><b>Main Method:</b> 'public static void main' is the entry point for the JVM.</p></div>
                    <div class="logic-step"><div class="step-num">3</div><p><b>System.out:</b> System is a class, out is an object, and println() is the method.</p></div>`
            },
            java2: {
                title: "User Input (Scanner)",
                tag: "JAVA PROGRAM 02",
                code: `import java.util.Scanner;\n\npublic class InputDemo {\n    public static void main(String[] args) {\n        Scanner sc = new Scanner(System.in);\n        System.out.print("Enter your age: ");\n        int age = sc.nextInt();\n        System.out.println("Age is: " + age);\n    }\n}`,
                logic: `
                    <div class="logic-step"><div class="step-num">1</div><p><b>Import:</b> java.util.Scanner is needed to read keyboard input.</p></div>
                    <div class="logic-step"><div class="step-num">2</div><p><b>Object:</b> 'new Scanner(System.in)' creates an object to listen to system input.</p></div>
                    <div class="logic-step"><div class="step-num">3</div><p><b>Buffer:</b> sc.nextInt() pauses the program until the user types a number.</p></div>`
            },
            java3: {
                title: "Factorial (Recursion)",
                tag: "JAVA PROGRAM 03",
                code: `public class Factorial {\n    static int fact(int n) {\n        if (n == 0) return 1;\n        return n * fact(n-1);\n    }\n    public static void main(String[] args) {\n        System.out.println("Fact of 5: " + fact(5));\n    }\n}`,
                logic: `
                    <div class="logic-step"><div class="step-num">1</div><p><b>Base Case:</b> 'if (n == 0)' stops the function from calling itself forever.</p></div>
                    <div class="logic-step"><div class="step-num">2</div><p><b>Stack:</b> Each recursive call is pushed onto the memory stack until it hits the base case.</p></div>`
            },
            java4: {
                title: "Method Overloading",
                tag: "JAVA PROGRAM 04",
                code: `public class MathOps {\n    int add(int a, int b) { return a + b; }\n    double add(double a, double b) { return a + b; }\n\n    public static void main(String[] args) {\n        MathOps obj = new MathOps();\n        System.out.println(obj.add(5, 10));\n        System.out.println(obj.add(5.5, 2.2));\n    }\n}`,
                logic: `
                    <div class="logic-step"><div class="step-num">1</div><p><b>Compile-time Polymorphism:</b> Methods have the same name but different parameters.</p></div>
                    <div class="logic-step"><div class="step-num">2</div><p><b>Signature:</b> Java identifies which method to run based on the data type you pass.</p></div>`
            },
            java5: {
                title: "Inheritance Logic",
                tag: "JAVA PROGRAM 05",
                code: `class Animal {\n    void eat() { System.out.println("Eating..."); }\n}\nclass Dog extends Animal {\n    void bark() { System.out.println("Barking..."); }\n}\npublic class Test {\n    public static void main(String[] args) {\n        Dog d = new Dog();\n        d.eat();\n        d.bark();\n    }\n}`,
                logic: `
                    <div class="logic-step"><div class="step-num">1</div><p><b>extends:</b> This keyword creates a relationship between a Parent and Child class.</p></div>
                    <div class="logic-step"><div class="step-num">2</div><p><b>Reusability:</b> The Dog object can use the eat() method without rewriting it.</p></div>`
            }
        };

        function showCode(id) {
            document.querySelectorAll('.lab-item').forEach(el => el.classList.remove('active'));
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            } else {
                document.getElementById('default-item').classList.add('active');
            }
            document.getElementById('prog-title').innerText = labData[id].title;
            document.querySelector('.tag').innerText = labData[id].tag;
            document.getElementById('code-block').innerText = labData[id].code;
            document.getElementById('logic-text').innerHTML = labData[id].logic;
        }

        window.onload = function() { showCode('java1'); };

        function copyCode() {
            const code = document.getElementById('code-block').innerText;
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector('.btn-copy');
                btn.innerText = "Copied!";
                btn.style.background = "#059669";
                setTimeout(() => {
                    btn.innerHTML = '<i class="far fa-copy"></i> Copy Code';
                    btn.style.background = "#10b981";
                }, 2000);
            });
        }
    </script>
</body>
</html>
