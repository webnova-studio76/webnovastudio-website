<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Master Hub | Code Craft Academic</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
</head>
<body class="java-labs-page">

    <div id="global-header"></div>

    <div class="app-workspace-wrapper">
        
        <aside class="sidebar">
            <div class="sidebar-search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="libSearch" placeholder="Search Java programs, OOP concepts..." oninput="filterCatalogTree()">
            </div>
            <div class="category-group-container" id="catalogDirectory">
                </div>
        </aside>

        <main class="main-content">
            <div id="content-display">
                
                <nav class="breadcrumb-trail">
                    <span>Java Manual</span> / <span id="breadcrumbSection">Basics</span> / <span class="active-node" id="breadcrumbTitle">Hello World</span>
                </nav>

                <div class="header-box">
                    <h1 id="prog-title">Program Title</h1>
                    <div class="meta-badges-row">
                        <span class="meta-badge tier-pill" id="metaTier">Beginner</span>
                        <span class="meta-badge verified-tag"><i class="fas fa-check-circle"></i> Code Craft Audited</span>
                        <span class="meta-badge"><i class="fas fa-microchip"></i> SE 17+ Architecture</span>
                    </div>
                </div>

                <div class="content-grid">
                    
                    <div class="logic-container">
                        <div class="logic-header"><i class="fas fa-brain"></i> Program Logic &amp; Mechanics</div>
                        <div class="logic-body">
                            <div id="logic-text">
                                </div>
                            <div class="analysis-specs-box">
                                <span class="spec-item-node">Time Complexity: <strong id="specTime">O(1)</strong></span>
                                <span class="spec-item-node">Space Complexity: <strong id="specSpace">O(1)</strong></span>
                            </div>
                        </div>
                    </div>

                    <div class="terminal-container">
                        <div class="terminal-header">
                            <span class="dot" style="background: #ff5f56;"></span>
                            <span class="dot" style="background: #ffbd2e;"></span>
                            <span class="dot" style="background: #27c93f;"></span>
                            <span style="margin-left: 6px;"><i class="fas fa-terminal"></i> Terminal Runtime Output</span>
                        </div>
                        <div class="terminal-body" id="output-text"></div>
                    </div>

                </div>

                <div class="code-container">
                    <div class="code-header">
                        <div class="code-header-meta">
                            <i class="fas fa-file-code"></i> <span>Main.java</span>
                        </div>
                        <div class="code-actions-zone">
                            <button class="btn-code-action" onclick="openOnlineCompiler()"><i class="fas fa-play"></i> Run Online</button>
                            <button class="btn-code-action btn-copy" onclick="copyCodeStack()"><i class="far fa-copy"></i> Copy Code</button>
                        </div>
                    </div>
                    <div class="editor-workspace-canvas">
                        <div class="line-numbers-rail" id="lineNumbersRail">
                            </div>
                        <pre><code id="code-block"></code></pre>
                    </div>
                </div>

                <div class="viva-review-panel">
                    <h4>University Examination Viva Reference</h4>
                    <ul class="viva-list" id="vivaListMount">
                        </ul>
                </div>

                <div class="navigation-row-deck">
                    <button class="btn-nav-trigger" id="prevBtn" onclick="navigateProgram(-1)">&larr; Previous Lab</button>
                    <button class="btn-nav-trigger" id="nextBtn" onclick="navigateProgram(1)">Next Lab &rarr;</button>
                </div>

            </div>
        </main>

    </div>

    <div class="toast-notification" id="toastAlert">
        <i class="fas fa-check"></i> Java source code copied to clipboard successfully!
    </div>

    <div id="global-footer"></div>

    <script src="main.js"></script>
    <script src="footer.js"></script>

    <script>
    /* ==========================================================================
       📦 CENTRAL SINGLE SOURCE OF TRUTH PLATFORM DIRECTORY DATABASE (ALL PROGRAMS)
       ========================================================================== */
    const LAB_DATABASE = [
        // --- GROUP 1: LANGUAGE FUNDAMENTALS ---
        { id: "p1", title: "01. Hello World", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello World");\n    }\n}`, logic: "Output Matrix: Utilizes the static standard system out print stream descriptor to pipe strings to stdout console channels.", output: "$ javac Main.java\n$ java Main\nHello World", viva: [{ q: "What does 'public static void main' mean?", a: "public allows JVM access; static allows method invocation without instantiating objects; void means zero value return." }] },
        { id: "p2", title: "02. Add Two Numbers", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int a = 10, b = 20;\n        System.out.println("Sum: " + (a + b));\n    }\n}`, logic: "Binary Operators: Evaluates standard arithmetic sum additions inside statement execution tracks.", output: "$ java Main\nSum: 30", viva: [{ q: "Why wrap (a + b) inside parentheses parameters?", a: "To ensure mathematical computation compiles first before evaluating string string appending operations parameters." }] },
        { id: "p3", title: "03. Swap (3rd Var)", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int a = 5, b = 10;\n        int t = a; a = b; b = t;\n        System.out.println(a + " " + b);\n    }\n}`, logic: "Temporary Buffer: Allocates an interim stack variable tracker block to protect data values from overwritten sweeps.", output: "$ java Main\n10 5", viva: [{ q: "What memory space manages these primitive integers?", a: "Local primitive execution values variables are stored inside runtime thread stack frames." }] },
        { id: "p4", title: "04. Swap (No Var)", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int a = 5, b = 10;\n        a = a + b; b = a - b; a = a - b;\n        System.out.println(a + " " + b);\n    }\n}`, logic: "Arithmetic Inversion: Runs logic accumulators and differences configurations to swap data states without space overhead scales.", output: "$ java Main\n10 5", viva: [{ q: "Can this cause values integer boundary leaks?", a: "Yes, exceeding standard Integer.MAX_VALUE limits causes bit overflow wrapping anomalies." }] },
        { id: "p5", title: "05. Even or Odd", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int n = 15;\n        if(n % 2 == 0) System.out.println("Even");\n        else System.out.println("Odd");\n    }\n}`, logic: "Modulo Operator: Computes conditional remainder metrics verifying if numerical divisions leave balances.", output: "$ java Main\nOdd", viva: [{ q: "What does the '%' operator track?", a: "Isolates the remaining mathematical remainder scalar left over following integer long division steps." }] },

        // --- GROUP 2: STRINGS & ALGORITHMS ---
        { id: "p24", title: "24. String Palindrome", category: "Strings & Algorithms", tier: "Intermediate", timeComp: "O(N)", spaceComp: "O(N)", code: `public class Main {\n    public static void main(String[] args) {\n        String s = "racecar";\n        String r = new StringBuilder(s).reverse().toString();\n        System.out.println(s.equals(r));\n    }\n}`, logic: "Heap Allocation: Uses the mutable StringBuilder infrastructure class helper to execute fast structural characters flips operations safely.", output: "$ java Main\ntrue", viva: [{ q: "Why use StringBuilder over standard String variables references?", a: "Java Strings are immutable. Looping string edits creates garbage heap footprint clusters; StringBuilder alters memory data locally inside one buffer block." }] },
        { id: "p25", title: "25. Reverse String", category: "Strings & Algorithms", tier: "Beginner", timeComp: "O(N)", spaceComp: "O(N)", code: `public class Main {\n    public static void main(String[] args) {\n        String s = "Nova", r = "";\n        for(int i = s.length()-1; i >= 0; i--) r += s.charAt(i);\n        System.out.println(r);\n    }\n}`, logic: "Backward Extraction Loops: Loops through character string bounds backward to extract data and build alternative sequences.", output: "$ java Main\navoN", viva: [{ q: "What occurs inside memory frames during (r += s.charAt(i)) loops?", a: "Creates entirely distinct discarded String objects on each pass, degrading loop performance tracks metrics." }] },

        // --- GROUP 3: OBJECT ORIENTED JAVA ---
        { id: "p32", title: "32. Class & Object", category: "Object Oriented Java", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `class Demo {\n    void hi() { System.out.println("Hi"); }\n}\npublic class Main {\n    public static void main(String[] args) {\n        Demo obj = new Demo(); obj.hi();\n    }\n}`, logic: "Object Construction: Reserves dynamic instance references data structures blocks inside system heap memory layers using explicitly allocated new operators markers.", output: "$ java Main\nHi", viva: [{ q: "What is an object in Java framework design?", a: "A real instance instantiation of a class blueprint template, carrying its own state fields registers." }] },
        { id: "p35", title: "35. Method Override", category: "Object Oriented Java", tier: "Intermediate", timeComp: "O(1)", spaceComp: "O(1)", code: `class Parent { void show() { System.out.println("P"); } }\nclass Child extends Parent {\n    @Override void show() { System.out.println("C"); }\n}\npublic class Main {\n    public static void main(String[] args) {\n        Parent obj = new Child(); obj.show();\n    }\n}`, logic: "Runtime Polymorphism: Resolves and fires sub-class code configurations overrides using dynamic dispatch lookups architectures maps.", output: "$ java Main\nC", viva: [{ q: "What conditions establish dynamic overriding rules parameters?", a: "Methods signatures must match identically across inheritance hierarchies parent-child lines." }] },

        // --- GROUP 4: ADVANCED CONCURRENCY & STREAMS ---
        { id: "p61", title: "61. Thread Pool Executor", category: "Advanced Concurrency & Streams", tier: "Advanced", timeComp: "O(N)", spaceComp: "O(K)", code: `import java.util.concurrent.*;\n\npublic class Main {\n    public static void main(String[] args) {\n        ExecutorService pool = Executors.newFixedThreadPool(3);\n        for(int i=0; i<5; i++) {\n            pool.execute(() -> System.out.println(Thread.currentThread().getName()));\n        }\n        pool.shutdown();\n    }\n}`, logic: "Functional Bi-Consumer Lambdas: Reuses a fixed pool of initialized threads to execute system tasks concurrently, preventing memory exhaustion bugs.", output: "$ java Main\npool-1-thread-1\npool-1-thread-2\npool-1-thread-3\npool-1-thread-1", viva: [{ q: "What risk accompanies un-pooled thread spawning pipelines?", a: "Continuous thread generation triggers severe OS kernel memory leaks and CPU context-switching thrashing constraints." }] }
    ];

    let activeTargetIndexId = "p1";
    let localSearchQueryStringCache = "";

    /* ==========================================================================
       🧠 REAL-TIME PROCESSING CORE PIPELINE ENGINE
       ========================================================================== */
    function renderCatalogTree() {
        const directoryContainer = document.getElementById('catalogDirectory');
        directoryContainer.innerHTML = "";

        const catalogGroupedTree = {};
        LAB_DATABASE.forEach(item => {
            const searchMatch = item.title.toLowerCase().includes(localSearchQueryStringCache) || 
                                item.category.toLowerCase().includes(localSearchQueryStringCache);
            
            if (searchMatch) {
                if (!catalogGroupedTree[item.category]) {
                    catalogGroupedTree[item.category] = [];
                }
                catalogGroupedTree[item.category].push(item);
            }
        });

        const uniqueKeys = Object.keys(catalogGroupedTree);
        if (uniqueKeys.length === 0) {
            directoryContainer.innerHTML = `<p style="font-size: 0.78rem; padding: 12px; color: #94a3b8; font-weight: 500;">No matching labs found.</p>`;
            return;
        }

        uniqueKeys.forEach(categoryKey => {
            let listElementsHTML = "";
            catalogGroupedTree[categoryKey].forEach(item => {
                const activeStateClass = item.id === activeTargetIndexId ? "active" : "";
                listElementsHTML += `<li class="lab-item ${activeStateClass}" data-id="${item.id}">${item.title}</li>`;
            });

            const groupHTML = `
                <div class="category-group-container" data-cat-name="${categoryKey}">
                    <div class="category-header-toggle" onclick="toggleFolderViewBlock(this)">
                        <span>▼ ${categoryKey}</span>
                    </div>
                    <ul class="lab-list">
                        ${listElementsHTML}
                    </ul>
                </div>
            `;
            directoryContainer.insertAdjacentHTML('beforeend', groupHTML);
        });

        document.querySelectorAll('.lab-item').forEach(itemNode => {
            itemNode.addEventListener('click', () => {
                activeTargetIndexId = itemNode.dataset.id;
                document.querySelectorAll('.lab-item').forEach(el => el.classList.remove('active'));
                itemNode.classList.add('active');
                syncMainWorkspaceView();
            });
        });

        updateNavigationButtonsStateBounds();
    }

    function filterCatalogTree() {
        localSearchQueryStringCache = document.getElementById('libSearch').value.toLowerCase().trim();
        renderCatalogTree();
    }

    function toggleFolderViewBlock(headerNode) {
        const parentContainerElement = headerNode.parentElement;
        parentContainerElement.classList.toggle('collapsed');
        const spanTextNode = headerNode.querySelector('span');
        if (parentContainerElement.classList.contains('collapsed')) {
            spanTextNode.innerText = spanTextNode.innerText.replace('▼', '▶');
        } else {
            spanTextNode.innerText = spanTextNode.innerText.replace('▶', '▼');
        }
    }

    function syncMainWorkspaceView() {
        const dataNode = LAB_DATABASE.find(item => item.id === activeTargetIndexId);
        if (!dataNode) return;

        document.getElementById('prog-title').innerText = dataNode.title;
        document.getElementById('breadcrumbSection').innerText = dataNode.category;
        document.getElementById('breadcrumbTitle').innerText = dataNode.title;
        document.getElementById('metaTier').innerText = dataNode.tier;
        document.getElementById('specTime').innerText = dataNode.timeComp;
        document.getElementById('specSpace').innerText = dataNode.spaceComp;

        document.getElementById('logic-text').innerHTML = `
            <div class="logic-step">
                <div class="step-num">i</div>
                <p>${dataNode.logic}</p>
            </div>
        `;

        document.getElementById('output-text').innerText = dataNode.output;
        document.getElementById('code-block').innerText = dataNode.code;

        const lineCount = dataNode.code.split('\n').length;
        let lineRailHTML = "";
        for (let i = 1; i <= lineCount; i++) {
            lineRailHTML += `${i}<br>`;
        }
        document.getElementById('lineNumbersRail').innerHTML = lineRailHTML;

        const vivaMount = document.getElementById('vivaListMount');
        vivaMount.innerHTML = "";
        dataNode.viva.forEach(item => {
            const nodeHTML = `<li class="viva-node"><strong>Q: ${item.q}</strong><p>A: ${item.a}</p></li>`;
            vivaMount.insertAdjacentHTML('beforeend', nodeHTML);
        });

        updateNavigationButtonsStateBounds();
    }

    function updateNavigationButtonsStateBounds() {
        const currentIndex = LAB_DATABASE.findIndex(i => i.id === activeTargetIndexId);
        document.getElementById('prevBtn').disabled = (currentIndex === 0);
        document.getElementById('nextBtn').disabled = (currentIndex === LAB_DATABASE.length - 1);
    }

    function navigateProgram(directionOffset) {
        const currentIndex = LAB_DATABASE.findIndex(i => i.id === activeTargetIndexId);
        const targetTargetIndex = currentIndex + directionOffset;
        if (targetTargetIndex >= 0 && targetTargetIndex < LAB_DATABASE.length) {
            activeTargetIndexId = LAB_DATABASE[targetTargetIndex].id;
            renderCatalogTree();
            syncMainWorkspaceView();
            
            const targetedListItemNode = document.querySelector(`.lab-item[data-id="${activeTargetIndexId}"]`);
            if (targetedListItemNode) targetedListItemNode.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
    }

    function copyCodeStack() {
        const codeStringValue = document.getElementById('code-block').innerText;
        navigator.clipboard.writeText(codeStringValue).then(() => {
            const toastAlert = document.getElementById('toastAlert');
            toastAlert.style.display = 'flex';
            setTimeout(() => { toastAlert.style.display = 'none'; }, 2500);
        });
    }

    function openOnlineCompiler() {
        window.open("https://www.onlinegdb.com/online_java_compiler", "_blank");
    }

    window.onload = () => {
        renderCatalogTree();
        syncMainWorkspaceView();
    };
</script>
</body>
</html>
