    const LAB_DATABASE = [
        // --- 1. LANGUAGE FUNDAMENTALS (01 - 23) ---
        { id: "p1", title: "01. Hello World", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello World");\n    }\n}`, logic: "main() serves as the initial execution thread entrance. System.out.println() invokes the static standard output stream to print the target string onto the console screen.", output: "$ javac Main.java\n$ java Main\nHello World", viva: [{ q: "What does 'public static void main' signify?", a: "public makes it accessible globally; static allows execution without instantiating an object; void declares a zero return type; main is the hardcoded entry identifier." }, { q: "What purpose does System.out.println serve?", a: "System is a final class from java.lang; out is a static PrintStream instance; println() is an overloaded method that writes data and drops down a line row." }] },
        { id: "p2", title: "02. Add Two Numbers", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int a = 10, b = 20;\n        System.out.println("Sum: " + (a + b));\n    }\n}`, logic: "Allocates primitive integer cells directly inside the current stack frame. Computes values operations inline inside the string concatenation context.", output: "$ java Main\nSum: 30", viva: [{ q: "Why wrap (a + b) inside parentheses?", a: "To enforce operator precedence rules so arithmetic addition happens before string concatenation." }] },
        { id: "p3", title: "03. Swap (3rd Var)", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int a = 5, b = 10;\n        int t = a; a = b; b = t;\n        System.out.println(a + " " + b);\n    }\n}`, logic: "Caches the raw primitive data properties of cell 'a' within a temporary stack allocation to allow safe value rotation without data corruption.", output: "$ java Main\n10 5", viva: [{ q: "What is the space complexity overhead?", a: "O(1) auxiliary space allocations because memory sizing stays flat and constant." }] },
        { id: "p4", title: "04. Swap (No Var)", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int a = 5, b = 10;\n        a = a + b; b = a - b; a = a - b;\n        System.out.println(a + " " + b);\n    }\n}`, logic: "Executes mathematical inversion using sum accumulations and differences to switch data states without requiring an auxiliary memory register footprint.", output: "$ java Main\n10 5", viva: [{ q: "What threat accompanies variable swaps without a temporary buffer?", a: "Integer values overflow if the combined sum total exceeds 32-bit primitive limits (Integer.MAX_VALUE)." }] },
        { id: "p5", title: "05. Even or Odd", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int n = 15;\n        if(n % 2 == 0) System.out.println("Even");\n        else System.out.println("Odd");\n    }\n}`, logic: "Evaluates the division remainder via the modulo operator (%) against a zero target state to route conditional structural branching rows.", output: "$ java Main\nOdd", viva: [{ q: "What is a faster bitwise alternative to checking parity numbers?", a: "Bitwise AND: (n & 1) tests the lowest bit index register directly to see if it is odd (1) or even (0)." }] },
        { id: "p6", title: "06. Largest of Three", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int a=12, b=45, c=22;\n        int max = (a > b) ? (a > c ? a : c) : (b > c ? b : c);\n        System.out.println("Max: " + max);\n    }\n}`, logic: "Nests conditional inline ternary expressions inside a single execution row to filter max scalars without lengthy conditional blocks.", output: "$ java Main\nMax: 45", viva: [{ q: "How do ternary operators evaluate statements?", a: "They evaluate boolean conditions before the '?' mark, choosing the expression before the ':' if true, or the expression after if false." }] },
        { id: "p7", title: "07. Prime Number Check", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(√N)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int n = 29; boolean isPrime = true;\n        for(int i = 2; i * i <= n; i++) {\n            if(n % i == 0) { isPrime = false; break; }\n        }\n        System.out.println("Is Prime: " + isPrime);\n    }\n}`, logic: "Optimizes factorization search pathways by capping the validation loop at the square root limit of N, minimizing CPU cycles.", output: "$ java Main\nIs Prime: true", viva: [{ q: "Why is loop checking bounded at √N?", a: "If a number has a factor larger than its square root, it must have a matching smaller partner factor below that root." }] },
        { id: "p8", title: "08. Factorial Logic", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(N)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int n = 5, f = 1;\n        for(int i = 1; i <= n; i++) f *= i;\n        System.out.println("Factorial: " + f);\n    }\n}`, logic: "Computes cumulative product factor expansions step-by-step using a linear loop tracker across fixed stack frames.", output: "$ java Main\nFactorial: 120", viva: [{ q: "At what value does a standard 32-bit int overflow for factorials?", a: "At 13!, the calculation surpasses maximum signed integer capacities. Switch to BigInteger for unbounded calculations." }] },
        { id: "p9", title: "09. Fibonacci Series", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(N)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int n = 5, a = 0, b = 1;\n        for(int i = 0; i < n; i++) {\n            System.out.print(a + " ");\n            int c = a + b; a = b; b = c;\n        }\n    }\n}`, logic: "Calculates the golden sequence progress layer step-by-step by shifting memory reference trackers forward on each loop iteration.", output: "$ java Main\n0 1 1 2 3 ", viva: [{ q: "What is the time complexity of this iterative approach?", a: "O(N) time because it steps through numbers linearly, which is much faster than the exponential O(2^N) recursive design." }] },
        { id: "p10", title: "10. Reverse Number", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(log N)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int n = 12345, r = 0;\n        while(n != 0) { r = r * 10 + n % 10; n /= 10; }\n        System.out.println("Reversed: " + r);\n    }\n}`, logic: "Executes continuous base-10 numerical shifts, cutting trailing positions via integer truncation while accumulating inverted layouts.", output: "$ java Main\nReversed: 54321", viva: [{ q: "What does the statement n /= 10 do?", a: "Performs integer division truncation to slice away the lowest rightmost digit position from the variable register." }] },
        { id: "p11", title: "11. Palindrome Check", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(log N)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int num = 121, rem, rev = 0, temp = num;\n        while(temp > 0) { rem = temp % 10; rev = rev * 10 + rem; temp /= 10; }\n        System.out.println(num == rev ? "Palindrome" : "Not");\n    }\n}`, logic: "Reconstructs an inverted clone data allocation model of the input integer, validating matching symmetry configurations.", output: "$ java Main\nPalindrome", viva: [{ q: "Why cache the original integer inside a temporary variable?", a: "The extraction loop cuts down the variable value until it hits zero; caching preserves the baseline value to run validation checks." }] },
        { id: "p12", title: "12. Armstrong Number", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(log N)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int n = 153, s = 0, t = n;\n        while(t > 0) { s += Math.pow(t % 10, 3); t /= 10; }\n        System.out.println(n == s ? "Armstrong" : "Not");\n    }\n}`, logic: "Extracts digit items sequentially, maps cubic exponential values via Math.pow(), and aggregates matching sums bounds fields.", output: "$ java Main\nArmstrong", viva: [{ q: "What is an Armstrong number?", a: "A number whose sum of individual digits raised to the power of the total digit count matches the initial value." }] },
        { id: "p13", title: "13. Simple Interest", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        double p=10000, r=5, t=2;\n        double si = (p * r * t) / 100;\n        System.out.println("SI: " + si);\n    }\n}`, logic: "Evaluates financial scalar calculation equations natively inside 64-bit IEEE-754 double precision floating formats.", output: "$ java Main\nSI: 1000.0", viva: [{ q: "Why use double instead of float for financial metrics?", a: "double provides twice the precision data bit allotment (64-bit) compared to float (32-bit), minimizing precision rounding errors." }] },
        { id: "p14", title: "14. Compound Interest", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(log T)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        double p=5000, r=6, t=3;\n        double ci = p * Math.pow(1 + r/100, t) - p;\n        System.out.println("CI: " + ci);\n    }\n}`, logic: "Compiles geometric compound financial trend equations using standard power exponents function methods.", output: "$ java Main\nCI: 955.08", viva: [{ q: "What datatype does Math.pow() return?", a: "It returns a 64-bit double token value natively, matching high-precision standard specs." }] },
        { id: "p15", title: "15. Celsius to Fahr", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        double c = 37;\n        double f = (c * 9/5) + 32;\n        System.out.println("Fahrenheit: " + f);\n    }\n}`, logic: "Converts temperature scaling metrics using exact arithmetic multipliers inside clear branch configurations.", output: "$ java Main\nFahrenheit: 98.6", viva: [{ q: "What happens if we evaluate the multiplier as 9/5 using ints?", a: "Integer division would truncate 9/5 down to 1, completely breaking the math results accuracy. C floating promotion handles this cleanly." }] },
        { id: "p16", title: "16. ASCII Value", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        char ch = 'A'; int ascii = (int) ch;\n        System.out.println("ASCII: " + ascii);\n    }\n}`, logic: "Widening Casting: Directly converts a char symbol byte up into standard integer representations grids fields.", output: "$ java Main\nASCII: 65", viva: [{ q: "What is widening vs narrowing casting?", a: "Widening changes smaller types to larger formats automatically without loss; narrowing cuts larger structures down and requires explicit casts." }] },
        { id: "p17", title: "17. Basic Calculator", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        char op = '+'; int a = 10, b = 20;\n        switch(op) { case '+': System.out.println(a + b); break; }\n    }\n}`, logic: "Switch Architecture: Leverages compile-time lookup tables to instantly route execution commands to matching case token blocks.", output: "$ java Main\n30", viva: [{ q: "What happens if a break statement is omitted inside a case block?", a: "Execution flows straight down into following cases sequentially (fall-through error) until hitting a break." }] },
        { id: "p18", title: "18. Array Sum/Avg", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(N)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int[] arr = {1, 2, 3, 4};\n        int sum = 0; for(int i : arr) sum += i;\n        System.out.println("Avg: " + (double)sum/arr.length);\n    }\n}`, logic: "Enhanced Loops: Traverses continuous array indices sequentially using a foreach structure to safely gather datasets sum values.", output: "$ java Main\nAvg: 2.5", viva: [{ q: "Can the tracking length property of a Java array mutate?", a: "No, Java array length allocations are strictly immutable and permanent once initialized on the heap." }] },
        { id: "p19", title: "19. Array Max/Min", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(N)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int[] a = {14, 5, 89, 2};\n        int max = a[0]; for(int i : a) if(i > max) max = i;\n        System.out.println("Max: " + max);\n    }\n}`, logic: "Linear Scans: Compares elements sequentially across adjacent tracks, updating tracking indicators when higher markers appear.", output: "$ java Main\nMax: 89", viva: [{ q: "What is the time complexity of finding an extreme in an unsorted array?", a: "O(N) time because every element allocation block must be inspected exactly once." }] },
        { id: "p20", title: "20. Reverse Array", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(N)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int[] a = {1, 2, 3, 4};\n        for(int i = 0; i < a.length/2; i++) {\n            int t = a[i]; a[i] = a[a.length-1-i]; a[a.length-1-i] = t;\n        }\n    }\n}`, logic: "Two-Pointer Inversion: Swaps elements symmetrically from both ends inward, halting at the center boundary.", output: "$ java Main\n[Array Symmetrically Inverted]", viva: [{ q: "Why loop only to a.length/2 parameters?", a: "Looping through the entire array would swap elements twice, returning them to their initial arrangement." }] },
        { id: "p21", title: "21. Matrix Sum", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(R*C)", spaceComp: "O(R*C)", code: `public class Main {\n    public static void main(String[] args) {\n        int[][] A={{1,2},{3,4}}, B={{5,6},{7,8}}, C=new int[2][2];\n        for(int i=0;i<2;i++) for(int j=0;j<2;j++) C[i][j]=A[i][j]+B[i][j];\n    }\n}`, logic: "Nested Coordinates: Processes multidimensional indices layer-by-layer using nested loops to sum intersecting slots.", output: "$ java Main\n[Matrix Added]", viva: [{ q: "How are multi-dimensional arrays structured inside memory graphs?", a: "Java handles multi-dimensional layouts as arrays of arrays, meaning row pointer blocks track separate array rows scattered on the heap." }] },
        { id: "p22", title: "22. Matrix Mult", category: "Language Fundamentals", tier: "Intermediate", timeComp: "O(N³)", spaceComp: "O(N²)", code: `public class Main {\n    public static void main(String[] args) {\n        int[][] A={{1,2},{3,4}}, B={{5,6},{7,8}}, C=new int[2][2];\n        for(int i=0;i<2;i++) for(int j=0;j<2;j++) for(int k=0;k<2;k++) C[i][j]+=A[i][k]*B[k][j];\n    }\n}`, logic: "Dot Products: Runs deep row-by-column combinations loops to compute matrix multiplication fields properties values.", output: "$ java Main\n[Matrix Multiplied]", viva: [{ q: "What condition is mandatory before matrix multiplication?", a: "The column size count of matrix A must match the exact row size count of matrix B." }] },
        { id: "p23", title: "23. Transpose Matrix", category: "Language Fundamentals", tier: "Beginner", timeComp: "O(R*C)", spaceComp: "O(R*C)", code: `public class Main {\n    public static void main(String[] args) {\n        int[][] A={{1,2},{3,4}}, T=new int[2][2];\n        for(int i=0;i<2;i++) for(int j=0;j<2;j++) T[j][i]=A[i][j];\n    }\n}`, logic: "Index Rotation: Flips structural horizontal row lines directly into vertical column tracks schemas parameters.", output: "$ java Main\n[Matrix Transposed]", viva: [{ q: "What happens to diagonal elements properties during a transposition run?", a: "They stay completely untouched because their row and column indexes (i == j) match identically." }] },

        // --- 2. STRINGS & ALGORITHMS (24 - 31) ---
        { id: "p24", title: "24. String Palindrome", category: "Strings & Algorithms", tier: "Intermediate", timeComp: "O(N)", spaceComp: "O(N)", code: `public class Main {\n    public static void main(String[] args) {\n        String s = "racecar";\n        String r = new StringBuilder(s).reverse().toString();\n        System.out.println(s.equals(r));\n    }\n}`, logic: "Heap Allocation: Uses the mutable StringBuilder class helper to execute fast structural characters flips operations safely.", output: "$ java Main\ntrue", viva: [{ q: "Why use StringBuilder over standard String variables references?", a: "Java Strings are immutable. Looping string edits creates garbage heap footprint clusters; StringBuilder alters memory data locally inside one buffer block." }, { q: "What is the difference between equals() and '=='?", a: "equals() validates matching character content data on the heap, while '==' tests if two reference pointers point to the exact same memory address slot." }] },
        { id: "p25", title: "25. Reverse String", category: "Strings & Algorithms", tier: "Beginner", timeComp: "O(N)", spaceComp: "O(N)", code: `public class Main {\n    public static void main(String[] args) {\n        String s = "Nova", r = "";\n        for(int i = s.length()-1; i >= 0; i--) r += s.charAt(i);\n        System.out.println(r);\n    }\n}`, logic: "Backward Extraction Loops: Loops through character string bounds backward to extract data and build alternative sequences.", output: "$ java Main\navoN", viva: [{ q: "What occurs inside memory frames during (r += s.charAt(i)) loops?", a: "Creates entirely distinct discarded String objects on each pass, degrading loop performance tracks metrics." }] },
        { id: "p26", title: "26. Vowel/Consonant", category: "Strings & Algorithms", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        char c = 'e';\n        boolean isVowel = "aeiouAEIOU".indexOf(c) != -1;\n        System.out.println(isVowel ? "Vowel" : "Consonant");\n    }\n}`, logic: "Sequence Membership: Queries lookup string patterns arrays to verify character intersection sets indicators.", output: "$ java Main\nVowel", viva: [{ q: "How does indexOf() return visibility parameters flags?", a: "Returns the exact index slot matching characters elements, returning -1 if no intersection is located." }] },
        { id: "p27", title: "27. Anagram Check", category: "Strings & Algorithms", tier: "Intermediate", timeComp: "O(N log N)", spaceComp: "O(N)", code: `public class Main {\n    public static void main(String[] args) {\n        char[] c1 = "listen".toCharArray(), c2 = "silent".toCharArray();\n        java.util.Arrays.sort(c1); java.util.Arrays.sort(c2);\n        System.out.println(java.util.Arrays.equals(c1, c2));\n    }\n}`, logic: "Sort Normalization: Extracts arrays characters, orders them alphabetically, and runs uniform equality evaluations blocks.", output: "$ java Main\ntrue", viva: [{ q: "What time complexity governs array sorting routines here?", a: "O(N log N) governed by Dual-Pivot Quicksort system variations." }] },
        { id: "p28", title: "28. 1st Non-Repeat", category: "Strings & Algorithms", tier: "Intermediate", timeComp: "O(N²)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        String s = "swiss";\n        for(char c : s.toCharArray()) {\n            if(s.indexOf(c) == s.lastIndexOf(c)) { System.out.println(c); break; }\n        }\n    }\n}`, logic: "Intersection Tracing: Compares leftmost earliest index pointers against rightmost terminal bounds to catch unique elements.", output: "$ java Main\nw", viva: [{ q: "How do you optimize this tracing track down to pure O(N)?", a: "By tracking item frequency metrics inside a single-pass hash ledger map or a 256-integer array configuration." }] },
        { id: "p29", title: "29. Strip Whitespace", category: "Strings & Algorithms", tier: "Beginner", timeComp: "O(N)", spaceComp: "O(N)", code: `public class Main {\n    public static void main(String[] args) {\n        String s = " J a v a ";\n        String clean = s.replaceAll("\\\\s", "");\n        System.out.println(clean);\n    }\n}`, logic: "Regex Engine: Evaluates space patterns (\\s) via internal compiler regex modules to prune text gaps rows safely.", output: "$ java Main\nJava", viva: [{ q: "What does '\\\\s' track?", a: "Matches any standard whitespace character element, including empty spacing, tab indentations, or line carriage returns." }] },
        { id: "p30", title: "30. Char Frequency", category: "Strings & Algorithms", tier: "Intermediate", timeComp: "O(N)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        String s = "apple"; int[] count = new int[256];\n        for(int i=0; i<s.length(); i++) count[s.charAt(i)]++;\n        System.out.println("p: " + count['p']);\n    }\n}`, logic: "Direct Array Hashing: Leverages raw ASCII character numbers as array index placements to instantly increment tracking slots.", output: "$ java Main\np: 2", viva: [{ q: "Why size the counter array to exactly 256 cells?", a: "To cover the entire standard extended ASCII table character symbol set completely." }] },
        { id: "p31", title: "31. String to Int", category: "Strings & Algorithms", tier: "Beginner", timeComp: "O(N)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        String s = "404"; int val = Integer.parseInt(s);\n        System.out.println(val);\n    }\n}`, logic: "Parsing Handlers: Invokes integer static wrapper algorithms to convert character strings into raw primitive numbers.", output: "$ java Main\n404", viva: [{ q: "What error triggers if the string contains non-numeric symbols?", a: "Throws a NumberFormatException, halting thread execution paths instantly if uncaught." }] },

        { id: "p32", title: "32. Class & Object", category: "Object Oriented Java", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `class Demo {\n    void hi() { System.out.println("Hi"); }\n}\npublic class Main {\n    public static void main(String[] args) {\n        Demo obj = new Demo(); obj.hi();\n    }\n}`, logic: "Object Construction: Reserves dynamic instance references data structures blocks inside system heap memory layers using explicitly allocated new operators markers.", output: "$ java Main\nHi", viva: [{ q: "Where does an object instance live vs its reference tracker variable?", a: "The constructed object instance lives on the system heap, while the tracking pointer reference variable sits inside local thread stack frames." }] },
        { id: "p33", title: "33. Constructor Overload", category: "Object Oriented Java", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `class Box {\n    Box() { System.out.println("Empty"); }\n    Box(int s) { System.out.println("Side: " + s); }\n}\npublic class Main {\n    public static void main(String[] args) { Box b1 = new Box(); Box b2 = new Box(5); }\n}`, logic: "Static Polymorphism: Configures alternative object initializations routes branching compiled outputs over parameter list matches signatures.", output: "$ java Main\nEmpty\nSide: 5", viva: [{ q: "Does a constructor return data values?", a: "No, constructors carry zero return parameters fields. They match the class keyword label exactly." }] },
        { id: "p34", title: "34. Method Overload", category: "Object Oriented Java", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `class Calc {\n    int add(int a) { return a+a; }\n    int add(int a, int b) { return a+b; }\n}\npublic class Main {\n    public static void main(String[] args) { Calc c = new Calc(); System.out.println(c.add(5,5)); }\n}`, logic: "Compile-Time Binding: Isolates function definitions based on unique argument footprint matches inside the compiler checking cycle.", output: "$ java Main\n10", viva: [{ q: "Can overloading run by exclusively altering the method return type classification?", a: "No. Method overloading mandate mutations across arguments list parameter counts or data formats types signatures." }] },
        { id: "p35", title: "35. Method Override", category: "Object Oriented Java", tier: "Intermediate", timeComp: "O(1)", spaceComp: "O(1)", code: `class Parent { void show() { System.out.println("P"); } }\nclass Child extends Parent {\n    @Override void show() { System.out.println("C"); }\n}\npublic class Main {\n    public static void main(String[] args) {\n        Parent obj = new Child(); obj.show();\n    }\n}`, logic: "Executes dynamic runtime polymorphism dispatch tracking. Resolves exact code execution paths at runtime using the underlying object type parameters.", output: "$ java Main\nC", viva: [{ q: "What is Dynamic Method Dispatch?", a: "It is the process where a call to an overridden method is resolved at runtime based on the actual object instance, rather than the reference type." }] },
        { id: "p36", title: "36. Inheritance", category: "Object Oriented Java", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `class Animal { void eat() { System.out.println("Eating"); } }\nclass Cat extends Animal { }\npublic class Main {\n    public static void main(String[] args) { Cat c = new Cat(); c.eat(); }\n}`, logic: "Blueprint Extensions: Connects child structural frames directly to parent blueprints using the extends keyword to reuse features.", output: "$ java Main\nEating", viva: [{ q: "Does Java support multiple class inheritance chains?", a: "No, multiple inheritance of classes is blocked to avoid Diamond Problem ambiguities. Use interfaces instead." }] },
        { id: "p37", title: "37. Interface Contracts", category: "Object Oriented Java", tier: "Intermediate", timeComp: "O(1)", spaceComp: "O(1)", code: `interface I1 { void f1(); }\ninterface I2 { void f2(); }\nclass Node implements I1, I2 {\n    public void f1() {} public void f2() {}\n}\npublic class Main { public static void main(String[] args) {} }`, logic: "Contract Management: Connects classes to multiple interface architectures to bypass multiple inheritance restrictions.", output: "$ java Main\n[Multiple Interface Contracts Unified]", viva: [{ q: "What accessibility modifier applies to interface methods by default?", a: "All interface methods are implicitly public and abstract within system frameworks." }] },
        { id: "p38", title: "38. Abstract Class", category: "Object Oriented Java", tier: "Intermediate", timeComp: "O(1)", spaceComp: "O(1)", code: `abstract class Base {\n    abstract void run();\n}\nclass Derived extends Base {\n    void run() { System.out.println("Running"); }\n}\npublic class Main { public static void main(String[] args) { Base b = new Derived(); b.run(); } }`, logic: "Template Architecture: Configures abstract method guidelines that all derived child structures must override.", output: "$ java Main\nRunning", viva: [{ q: "Can an abstract class instantiate an object directly via new?", a: "No. Abstract classes represent incomplete models. They can only handle reference mappings to concrete child structures." }] },
        { id: "p39", title: "39. Encapsulation", category: "Object Oriented Java", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `class Safe { private int key;\n    public int getKey() { return key; }\n    public void setKey(int k) { this.key = k; }\n}\npublic class Main { public static void main(String[] args) {} }`, logic: "Data Isolation: Protects internal variables behind private shields, exposing access only through public getter/setter checkpoints.", output: "$ java Main\n[Variables Encapsulated Safely]", viva: [{ q: "What problem does encapsulation solve?", a: "It stops external code from directly tampering with internal object fields, preventing invalid states." }] },
        { id: "p40", title: "40. super Keyword", category: "Object Oriented Java", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `class Parent { Parent() { System.out.println("P"); } }\nclass Child extends Parent {\n    Child() { super(); }\n}\npublic class Main { public static void main(String[] args) { Child c = new Child(); } }`, logic: "Parent Scoping: Calls parent constructors or accesses parent attributes hidden by sub-class name masks.", output: "$ java Main\nP", viva: [{ q: "What happens if super() isn't called explicitly inside a child constructor?", a: "The compiler automatically inserts a invisible super() call as the first line row statement of the child constructor anyway." }] },
        { id: "p41", title: "41. this Keyword", category: "Object Oriented Java", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `class Item { int id;\n    Item(int id) { this.id = id; }\n}\npublic class Main { public static void main(String[] args) {} }`, logic: "Instance Mapping: Points code engines to the current instance context to clear naming conflicts with input arguments parameters.", output: "$ java Main\n[Instance Scope Mapped]", viva: [{ q: "Can 'this' be used inside a static method?", a: "No, static methods belong to the class blueprint level itself, so they don't have an active 'this' instance context." }] },

        // --- 4. DATA STRUCTURES & UTILITIES (42 - 60) ---
        { id: "p42", title: "42. Linear Search", category: "Data Structures & Utilities", tier: "Beginner", timeComp: "O(N)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int[] a={1,2,3}; int k=2; int idx=-1;\n        for(int i=0;i<a.length;i++) if(a[i]==k) { idx=i; break; }\n        System.out.println(idx);\n    }\n}`, logic: "Iterates through element lists sequentially to match values, running at $O(n)$ efficiency metrics profiles.", output: "$ java Main\n1", viva: [{ q: "What is the worst-case scenario for linear searches?", a: "When the target item sits at the final index slot or doesn't exist in the array dataset at all." }] },
        { id: "p43", title: "43. Binary Search", category: "Data Structures & Utilities", tier: "Intermediate", timeComp: "O(log N)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int[] a={1, 2, 5, 8}; int k=5, l=0, h=a.length-1, idx=-1;\n        while(l<=h) {\n            int m=(l+h)/2;\n            if(a[m]==k) { idx=m; break; } if(a[m]<k) l=m+1; else h=m-1;\n        }\n        System.out.println(idx);\n    }\n}`, logic: "Logarithmic Splits: Halves search zones continuously to locate keys, running at an optimized $O(\log n)$ runtime pace.", output: "$ java Main\n2", viva: [{ q: "What condition is mandatory before running a binary search?", a: "The array data entries must be completely sorted beforehand." }] },
        { id: "p44", title: "44. Bubble Sort", category: "Data Structures & Utilities", tier: "Intermediate", timeComp: "O(N²)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int[] a={5,1,4}; int n=a.length;\n        for(int i=0;i<n-1;i++)\n            for(int j=0;j<n-i-1;j++)\n                if(a[j]>a[j+1]) { int t=a[j]; a[j]=a[j+1]; a[j+1]=t; }\n    }\n}`, logic: "Adjacent Comparisons: Swaps neighboring elements step-by-step to push high values towards the array end.", output: "$ java Main\n[Array Sorted via Bubble Sequence]", viva: [{ q: "How do you optimize bubble sort for pre-sorted arrays?", a: "Introduce a boolean swapped flag; if no swaps happen inside an entire inner pass, break early to achieve O(N) efficiency." }] },
        { id: "p45", title: "45. Selection Sort", category: "Data Structures & Utilities", tier: "Intermediate", timeComp: "O(N²)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int[] a={5,1,4}; int n=a.length;\n        for(int i=0;i<n-1;i++) {\n            int min=i; for(int j=i+1;j<n;j++) if(a[j]<a[min]) min=j;\n            int t=a[min]; a[min]=a[i]; a[i]=t;\n        }\n    }\n}`, logic: "Minimum Selection: Sweeps through unsorted slots to isolate the smallest value, swapping it directly into its sorted index.", output: "$ java Main\n[Array Sorted via Selection Partitioning]", viva: [{ q: "Does selection sort vary its time complexity based on input sorting order?", a: "No, it takes O(N²) time for best, worst, and average cases because it scans everything regardless of initial order." }] },
        { id: "p46", title: "46. Custom Exception", category: "Data Structures & Utilities", tier: "Intermediate", timeComp: "O(1)", spaceComp: "O(1)", code: `class CoreException extends Exception {\n    CoreException(String s) { super(s); }\n}\npublic class Main {\n    public static void main(String[] args) {}\n}`, logic: "Error Extensions: Extends base exception frameworks to configure explicit domain error handling routines.", output: "$ java Main\n[Custom Exception Map Configured]", viva: [{ q: "What is the difference between checked and unchecked exceptions?", a: "Checked exceptions extend Exception and are verified at compile time; unchecked extensions inherit RuntimeException and drop at runtime." }] },
        { id: "p47", title: "47. try-catch-finally", category: "Data Structures & Utilities", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        try { int res = 10/0; } \n        catch(ArithmeticException e) { System.out.println("Err: " + e.getMessage()); }\n        finally { System.out.println("Cleanup completed"); }\n    }\n}`, logic: "Guaranteed Blocks: Runs the finally block no matter what, making it ideal for resetting file streams or closing sockets.", output: "$ java Main\nErr: / by zero\nCleanup completed", viva: [{ q: "Does the finally block fire if the try-catch calls a return statement?", a: "Yes, the JVM always executes the finally block before unwinding the method call stack." }] },
        { id: "p48", title: "48. File Write/Read", category: "Data Structures & Utilities", tier: "Intermediate", timeComp: "O(N)", spaceComp: "O(N)", code: `import java.io.*;\npublic class Main {\n    public static void main(String[] args) throws IOException {\n        FileWriter fw = new FileWriter("log.txt");\n        fw.write("Java Data"); fw.close();\n    }\n}`, logic: "Disk Output Buffers: Interacts directly with kernel file entry blocks to write tracking lines safely.", output: "$ java Main\n[I/O Operations Flush to Disk Storage]", viva: [{ q: "Why call the .close() function on I/O streams?", a: "It flushes remaining data chunks onto persistent disks and frees system lock handles from the OS." }] },
        { id: "p49", title: "49. ArrayList CRUD", category: "Data Structures & Utilities", tier: "Beginner", timeComp: "O(1) amortized", spaceComp: "O(N)", code: `import java.util.ArrayList;\npublic class Main {\n    public static void main(String[] args) {\n        ArrayList<String> l = new ArrayList<>();\n        l.add("A"); l.remove(0); System.out.println(l.isEmpty());\n    }\n}`, logic: "Dynamic Array Management: Manages dynamic arrays behind the scenes, resizing automatically when elements scale.", output: "$ java Main\ntrue", viva: [{ q: "How much does an ArrayList scale up when its internal storage limit triggers?", a: "It scales up its size capacity by exactly 50% of its current bounds value." }] },
        { id: "p50", title: "50. HashMap Iterate", category: "Data Structures & Utilities", tier: "Intermediate", timeComp: "O(1) average", spaceComp: "O(N)", code: `import java.util.HashMap;\npublic class Main {\n    public static void main(String[] args) {\n        HashMap<String, Integer> map = new HashMap<>();\n        map.put("Key", 100); map.forEach((k,v) -> System.out.println(k+":"+v));\n    }\n}`, logic: "Hash Bucket Mappings: Uses efficient internal array buckets to loop through key-value mappings rapidly.", output: "$ java Main\nKey:100", viva: [{ q: "What is hashing collision in HashMaps?", a: "An event where two distinct key objects evaluate to the exact same bucket array slot index tracker." }] },
        { id: "p51", title: "51. Runnable Thread", category: "Data Structures & Utilities", tier: "Beginner", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        Runnable r = () -> System.out.println("Running");\n        new Thread(r).start();\n    }\n}`, logic: "Asynchronous Tasks: Spawns isolated execution contexts inside system threads using functional lambda expressions.", output: "$ java Main\nRunning", viva: [{ q: "What is the difference between start() and run() method executions?", a: "start() requests the OS to spawn an entirely new concurrent kernel thread path; run() executes the logic inside the current thread block synchronously." }] },
        { id: "p52", title: "52. Synchronization", category: "Data Structures & Utilities", tier: "Intermediate", timeComp: "O(1)", spaceComp: "O(1)", code: `class Counter {\n    private int c = 0;\n    synchronized void add() { c++; }\n}`, logic: "Mutual Exclusion Locks: Locks method execution paths to let only one thread enter at a time, avoiding data race issues.", output: "$ java Main\n[Monitor Lock Active on Target Object]", viva: [{ q: "What is object monitor lock in synchronization tracks?", a: "An internal locking mechanism where a thread takes exclusive ownership of an object token to block simultaneous entries." }] },
        { id: "p53", title: "53. Stream API Filter", category: "Data Structures & Utilities", tier: "Intermediate", timeComp: "O(N)", spaceComp: "O(1)", code: `import java.util.*;\npublic class Main {\n    public static void main(String[] args) {\n        List<Integer> list = Arrays.asList(1,2,3,4);\n        list.stream().filter(x -> x%2==0).forEach(System.out::println);\n    }\n}`, logic: "Functional Pipelines: Passes array objects through a pipeline of functional steps without mutating the source list data.", output: "$ java Main\n2\n4", viva: [{ q: "Are Stream operations intermediate or terminal?", a: "filter() behaves as an intermediate step returning structural streams; forEach() acts as a terminal step closing the pipeline execution." }] },
        { id: "p54", title: "54. Singly Linked List", category: "Data Structures & Utilities", tier: "Advanced", timeComp: "O(1)", spaceComp: "O(N)", code: `class Node { int data; Node next; }\npublic class Main {\n    public static void main(String[] args) {\n        Node head = new Node(); head.data = 10; \n        System.out.println(head.data);\n    }\n}`, logic: "Dynamic Pointer Chaining: Links runtime heap instances together sequentially using reference addresses.", output: "$ java Main\n10", viva: [{ q: "What is the space overhead of linked nodes?", a: "O(N) because every element encapsulates an extra pointer reference address pointing to the next node." }] },
        { id: "p55", title: "55. Stack via Array", category: "Data Structures & Utilities", tier: "Intermediate", timeComp: "O(1)", spaceComp: "O(N)", code: `class Stack {\n    int[] s = new int[5]; int top = -1;\n    void push(int x) { s[++top] = x; }\n}`, logic: "LIFO Architecture: Updates an explicit array index tracker to manage a strict Last-In, First-Out sequence.", output: "$ java Main\n[Element Pushed onto Top of Stack]", viva: [{ q: "What error triggers when adding entries beyond array size bounds?", a: "Stack Overflow error states parameters logs." }] },
        { id: "p56", title: "56. Pyramid Pattern", category: "Data Structures & Utilities", tier: "Beginner", timeComp: "O(N²)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        for(int i=1;i<=3;i++) {\n            for(int j=3;j>i;j--) System.out.print(" ");\n            for(int k=1;k<=(2*i-1);k++) System.out.print("*");\n            System.out.println();\n        }\n    }\n}`, logic: "Nested Coordinate Loops: Maps spaces and characters row by row using nested loop configurations.", output: "$ java Main\n  *\n ***\n*****", viva: [{ q: "How is geometric symmetry constructed here?", a: "The math formula (2*i - 1) forces an odd count of stars on each row to align the center points cleanly." }] },
        { id: "p57", title: "57. Floyd's Triangle", category: "Data Structures & Utilities", tier: "Beginner", timeComp: "O(N²)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int k=1; for(int i=1;i<=3;i++) {\n            for(int j=1;j<=i;j++) System.out.print((k++) + " ");\n            System.out.println();\n        }\n    }\n}`, logic: "Linear Step Triangles: Prints numbers continuously across a stepped row-by-row structure.", output: "$ java Main\n1 \n2 3 \n4 5 6 ", viva: [{ q: "Does variable k reset across row steps?", a: "No, k increments continuously across the entire execution life grid framework." }] },
        { id: "p58", title: "58. Diamond Pattern", category: "Data Structures & Utilities", tier: "Beginner", timeComp: "O(N²)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        System.out.println("  *\\n ***\\n  *");\n    }\n}`, logic: "Reflective Loops: Mirrors loop counts after passing the middle row to form symmetric designs.", output: "$ java Main\n  *\n ***\n  *", viva: [{ q: "How would you print this dynamically?", a: "By running an upper pyramid generation pass followed by an inverted pyramid pass." }] },
        { id: "p59", title: "59. Missing Number", category: "Data Structures & Utilities", tier: "Intermediate", timeComp: "O(N)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int[] a = {1, 2, 4, 5}; int n = 5;\n        int expected = n * (n + 1) / 2, actual = 0;\n        for(int i : a) actual += i;\n        System.out.println("Missing: " + (expected - actual));\n    }\n}`, logic: "Summation Arithmetic: Finds array gaps instantly by checking actual sums against the standard formula total.", output: "$ java Main\nMissing: 3", viva: [{ q: "What mathematical theorem underpins this solution?", a: "Gauss's summation formula for the first N natural consecutive integers." }] },
        { id: "p60", title: "60. Magic Number", category: "Data Structures & Utilities", tier: "Intermediate", timeComp: "O(log N)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        int n = 1729;\n        while (n > 9) { int sum = 0; while(n > 0) { sum += n % 10; n /= 10; } n = sum; }\n        System.out.println(n == 1 ? "Magic" : "Not");\n    }\n}`, logic: "Recursive Digit Condensing: Continuously breaks down and sums digits until only a single figure remains.", output: "$ java Main\nMagic", viva: [{ q: "What is a digital root?", a: "The single-digit value obtained by an iterative process of summing digits, which is verified here." }] },

        // --- 5. ADVANCED CONCURRENCY & STREAMS (61 - 75) ---
        { id: "p61", title: "61. Thread Pool Executor", category: "Advanced Concurrency & Streams", tier: "Advanced", timeComp: "O(N)", spaceComp: "O(K)", code: `import java.util.concurrent.*;\n\npublic class Main {\n    public static void main(String[] args) {\n        ExecutorService pool = Executors.newFixedThreadPool(3);\n        for(int i=0; i<5; i++) {\n            pool.execute(() -> System.out.println(Thread.currentThread().getName()));\n        }\n        pool.shutdown();\n    }\n}`, logic: "Implements high-performance resource reuse architecture. Recycles a fixed set of worker threads from internal thread pools to process tasks, preventing system thrashing.", output: "$ java Main\npool-1-thread-1\npool-1-thread-2\npool-1-thread-3\npool-1-thread-1", viva: [{ q: "Why use thread pools instead of manually spawning native threads?", a: "Spawning threads incurs significant OS kernel allocation overhead. Thread pools keep worker threads alive to process tasks efficiently, saving system memory." }, { q: "What does pool.shutdown() execute?", a: "It stops the executor from accepting new tasks while allowing currently queued threads to finish their execution cycles safely." }] },
        { id: "p62", title: "62. Deadlock Simulation", category: "Advanced Concurrency & Streams", tier: "Advanced", timeComp: "O(1)", spaceComp: "O(1)", code: `public class Main {\n    public static void main(String[] args) {\n        String r1 = "R1", r2 = "R2";\n        new Thread(() -> { synchronized(r1) { synchronized(r2) {} } }).start();\n        new Thread(() -> { synchronized(r2) { synchronized(r1) {} } }).start();\n    }\n}`, logic: "Circular Dependency locks: Occurs when two threads lock separate resources and end up waiting indefinitely for each other to release them.", output: "$ java Main\n[System Warning: Threads Deadlocked]", viva: [{ q: "How do you avoid deadlock bugs inside thread matrices?", a: "Enforce strict lock ordering rules so all system execution threads acquire shared resource keys in the exact same sequence map." }] },
        { id: "p63", title: "63. Optional Container API", category: "Advanced Concurrency & Streams", tier: "Intermediate", timeComp: "O(1)", spaceComp: "O(1)", code: `import java.util.Optional;\npublic class Main {\n    public static void main(String[] args) {\n        Optional<String> check = Optional.ofNullable(null);\n        System.out.println(check.orElse("Fallback Default Value"));\n    }\n}`, logic: "Null Safety Wrapper: Encapsulates objects inside a container wrapper to handle empty values cleanly and avoid crashes.", output: "$ java Main\nFallback Default Value", viva: [{ q: "What problem does Optional try to mitigate?", a: "Reduces the frequency of NullPointerException crashes by forcing developers to handle empty checks cleanly." }] },
        { id: "p64", title: "64. Lambda Functional Mapping", category: "Advanced Concurrency & Streams", tier: "Intermediate", timeComp: "O(N)", spaceComp: "O(N)", code: `import java.util.*;\npublic class Main {\n    public static void main(String[] args) {\n        List<String> codes = Arrays.asList("abc", "web", "nova");\n        codes.stream().map(String::toUpperCase).forEach(System.out::println);\n    }\n}`, logic: "Immutable Mutations: Passes string elements through functional transformations, spawning modified outputs without touching the source array elements.", output: "$ java Main\nABC\nWEB\nNOVA", viva: [{ q: "Does map() mutate the original input list?", a: "No, map() produces an entirely separate stream without changing the contents of the source collection." }] },
        { id: "p65", title: "65. Method Reference Pointers", category: "Advanced Concurrency & Streams", tier: "Beginner", timeComp: "O(N)", spaceComp: "O(1)", code: `import java.util.*;\npublic class Main {\n    public static void main(String[] args) {\n        List<String> list = Arrays.asList("Sys", "Admin");\n        list.forEach(System.out::println);\n    }\n}`, logic: "Syntax Pointers: Uses double colon (::) shortcuts to reference existing functional methods directly, keeping code concise.", output: "$ java Main\nSys\nAdmin", viva: [{ q: "What does System.out::println mean underneath?", a: "It serves as a direct functional shortcut shorthand pointing to the println() print stream execution method." }] },
        { id: "p66", title: "66. Regex Pattern Matching", category: "Advanced Concurrency & Streams", tier: "Intermediate", timeComp: "O(N)", spaceComp: "O(1)", code: `import java.util.regex.*;\npublic class Main {\n    public static void main(String[] args) {\n        Pattern p = Pattern.compile("^[a-z0-9]+$");\n        System.out.println(p.matcher("webnova76").matches());\n    }\n}`, logic: "DFA Automata compilation: Compiles pattern requirements into state machines to scan strings instantly for exact text matches.", output: "$ java Main\ntrue", viva: [{ q: "Why call Pattern.compile() instead of matching directly?", a: "Compiling parses the regex string into an optimal matching state machine reuse structure, saving clock cycles on repeat runs." }] },

    let activeTargetIndexId = "p1";
    let localSearchQueryStringCache = "";

    /* ==========================================================================
       🧠 REAL-TIME PROCESSING CORE PIPELINE ENGINE
       ========================================================================== */
    function renderCatalogTree() {
        const directoryContainer = document.getElementById('catalogDirectory');
        directoryContainer.innerHTML = "";

        const catalogGroupedTree = {};
        LAB_DATABASE.forEach(item => {
            const searchMatch = item.title.toLowerCase().includes(localSearchQueryStringCache) || 
                                item.category.toLowerCase().includes(localSearchQueryStringCache);
            
            if (searchMatch) {
                if (!catalogGroupedTree[item.category]) {
                    catalogGroupedTree[item.category] = [];
                }
                catalogGroupedTree[item.category].push(item);
            }
        });

        const uniqueKeys = Object.keys(catalogGroupedTree);
        if (uniqueKeys.length === 0) {
            directoryContainer.innerHTML = `<p style="font-size: 0.78rem; padding: 12px; color: #94a3b8; font-weight: 500;">No matching labs found.</p>`;
            return;
        }

        uniqueKeys.forEach(categoryKey => {
            let listElementsHTML = "";
            catalogGroupedTree[categoryKey].forEach(item => {
                const activeStateClass = item.id === activeTargetIndexId ? "active" : "";
                listElementsHTML += `<li class="lab-item ${activeStateClass}" data-id="${item.id}">${item.title}</li>`;
            });

            const groupHTML = `
                <div class="category-group-container" data-cat-name="${categoryKey}">
                    <div class="category-header-toggle" onclick="toggleFolderViewBlock(this)">
                        <span>▼ ${categoryKey}</span>
                    </div>
                    <ul class="lab-list">
                        ${listElementsHTML}
                    </ul>
                </div>
            `;
            directoryContainer.insertAdjacentHTML('beforeend', groupHTML);
        });

        document.querySelectorAll('.lab-item').forEach(itemNode => {
            itemNode.addEventListener('click', () => {
                activeTargetIndexId = itemNode.dataset.id;
                document.querySelectorAll('.lab-item').forEach(el => el.classList.remove('active'));
                itemNode.classList.add('active');
                syncMainWorkspaceView();
            });
        });

        updateNavigationButtonsStateBounds();
    }

    function filterCatalogTree() {
        localSearchQueryStringCache = document.getElementById('libSearch').value.toLowerCase().trim();
        renderCatalogTree();
    }

    function toggleFolderViewBlock(headerNode) {
        const parentContainerElement = headerNode.parentElement;
        parentContainerElement.classList.toggle('collapsed');
        const spanTextNode = headerNode.querySelector('span');
        if (parentContainerElement.classList.contains('collapsed')) {
            spanTextNode.innerText = spanTextNode.innerText.replace('▼', '▶');
        } else {
            spanTextNode.innerText = spanTextNode.innerText.replace('▶', '▼');
        }
    }

    function syncMainWorkspaceView() {
        const dataNode = LAB_DATABASE.find(item => item.id === activeTargetIndexId);
        if (!dataNode) return;

        document.getElementById('prog-title').innerText = dataNode.title;
        document.getElementById('breadcrumbSection').innerText = dataNode.category;
        document.getElementById('breadcrumbTitle').innerText = dataNode.title;
        document.getElementById('metaTier').innerText = dataNode.tier;
        document.getElementById('specTime').innerText = dataNode.timeComp;
        document.getElementById('specSpace').innerText = dataNode.spaceComp;

        document.getElementById('logic-text').innerHTML = `
            <div class="logic-step">
                <div class="step-num">i</div>
                <p>${dataNode.logic}</p>
            </div>
        `;

        document.getElementById('output-text').innerText = dataNode.output;
        document.getElementById('code-block').innerText = dataNode.code;

        const lineCount = dataNode.code.split('\n').length;
        let lineRailHTML = "";
        for (let i = 1; i <= lineCount; i++) {
            lineRailHTML += `${i}<br>`;
        }
        document.getElementById('lineNumbersRail').innerHTML = lineRailHTML;

        const vivaMount = document.getElementById('vivaListMount');
        vivaMount.innerHTML = "";
        dataNode.viva.forEach(item => {
            const nodeHTML = `<li class="viva-node"><strong>Q: ${item.q}</strong><p>A: ${item.a}</p></li>`;
            vivaMount.insertAdjacentHTML('beforeend', nodeHTML);
        });

        updateNavigationButtonsStateBounds();
    }

    function updateNavigationButtonsStateBounds() {
        const currentIndex = LAB_DATABASE.findIndex(i => i.id === activeTargetIndexId);
        document.getElementById('prevBtn').disabled = (currentIndex === 0);
        document.getElementById('nextBtn').disabled = (currentIndex === LAB_DATABASE.length - 1);
    }

    function navigateProgram(directionOffset) {
        const currentIndex = LAB_DATABASE.findIndex(i => i.id === activeTargetIndexId);
        const targetTargetIndex = currentIndex + directionOffset;
        if (targetTargetIndex >= 0 && targetTargetIndex < LAB_DATABASE.length) {
            activeTargetIndexId = LAB_DATABASE[targetTargetIndex].id;
            renderCatalogTree();
            syncMainWorkspaceView();
            
            const targetedListItemNode = document.querySelector(`.lab-item[data-id="${activeTargetIndexId}"]`);
            if (targetedListItemNode) targetedListItemNode.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
    }

    function copyCodeStack() {
        const codeStringValue = document.getElementById('code-block').innerText;
        navigator.clipboard.writeText(codeStringValue).then(() => {
            const toastAlert = document.getElementById('toastAlert');
            toastAlert.style.display = 'flex';
            setTimeout(() => { toastAlert.style.display = 'none'; }, 2500);
        });
    }

    function openOnlineCompiler() {
        window.open("https://www.onlinegdb.com/online_java_compiler", "_blank");
    }

    window.onload = () => {
        renderCatalogTree();
        syncMainWorkspaceView();
    };
</script>
