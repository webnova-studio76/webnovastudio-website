<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Master Hub | WebNova Academy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #f89820; --secondary: #0f172a; --accent: #10b981;
            --bg: #f8fafc; --code-bg: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar {
            width: 320px; background: var(--secondary); color: white;
            padding: 25px 15px; overflow-y: auto; display: flex;
            flex-direction: column; border-right: 4px solid var(--primary);
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .sidebar h2 { font-size: 1rem; margin-bottom: 20px; color: var(--primary); text-transform: uppercase; padding-left: 10px; }
        
        .lab-list { list-style: none; margin-bottom: 15px; }
        .lab-item {
            padding: 10px 15px; border-radius: 8px; margin-bottom: 4px;
            cursor: pointer; font-size: 0.8rem; color: #94a3b8; transition: 0.2s;
        }
        .lab-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .lab-item.active { background: var(--primary); color: white; font-weight: bold; }

        /* CONTENT */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .header-box { margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; }
        .header-box h1 { font-size: 1.8rem; color: var(--secondary); }
        .tag { display: inline-block; padding: 4px 12px; background: #ffeeda; border-radius: 20px; font-size: 0.65rem; font-weight: 800; margin-top: 10px; color: var(--primary); }

        .modern-notice { margin-top: 15px; background: #fffaf5; border: 1px solid #fed7aa; padding: 10px 15px; border-radius: 8px; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: #9a3412; }
        .modern-badge { margin-top: 12px; padding: 8px 15px; background: rgba(248, 152, 32, 0.1); border-radius: 6px; border-left: 4px solid var(--primary); display: inline-flex; align-items: center; gap: 10px; font-size: 0.75rem; color: var(--secondary); }

        .logic-container { margin-bottom: 25px; background: #fffaf5; border: 1px solid #fed7aa; border-radius: 12px; padding: 20px; }
        .logic-header { background: #fed7aa; padding: 10px 20px; font-weight: 800; color: #9a3412; font-size: 0.8rem; text-transform: uppercase; margin: -20px -20px 20px -20px; }
        .logic-step { margin-bottom: 8px; display: flex; gap: 10px; font-size: 0.85rem; color: #431407; }
        .step-num { background: #9a3412; color: white; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; flex-shrink: 0; }

        .code-container { background: var(--code-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .code-header { padding: 10px 20px; background: rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .btn-copy { background: var(--accent); color: white; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }

        pre { padding: 25px; color: #e2e8f0; font-family: monospace; font-size: 0.85rem; overflow-x: auto; line-height: 1.6; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2>Java Master Hub</h2>
    <ul class="lab-list" id="sidebar-list"></ul>
</aside>

<main class="main-content">
    <div class="header-box">
        <span class="tag" id="prog-tag">JAVA MASTER LIBRARY</span>
        <h1 id="prog-title">Select Program</h1>
        <div class="modern-notice">
            <i class="fas fa-bolt"></i> 
            <span><b>WebNova Standards:</b> Optimized for modern compilers. Minimal lines, maximum logic.</span>
        </div>
        <div class="modern-badge">
            <i class="fas fa-check-circle"></i>
            <span><b>Industry Standard:</b> Clean logic over lengthy code. Optimized for modern exams & Vivas.</span>
        </div>
    </div>

    <div class="logic-container">
        <div class="logic-header"><i class="fas fa-brain"></i> System Logic Breakdown</div>
        <div class="logic-body" id="logic-text"></div>
    </div>

    <div class="code-container">
        <div class="code-header">
            <span style="color: #64748b; font-size: 0.7rem; font-weight: bold;">Main.java</span>
            <button class="btn-copy" onclick="copyCode()"><i class="far fa-copy"></i> Copy Code</button>
        </div>
        <pre id="code-block"></pre>
    </div>
</main>

function initSidebar() {
    const list = document.getElementById('sidebar-list');
    Object.keys(labData).forEach(key => {
        const li = document.createElement('li');
        li.className = 'lab-item';
        li.innerText = labData[key].title;
        li.onclick = (e) => {
            document.querySelectorAll('.lab-item').forEach(el => el.classList.remove('active'));
            li.classList.add('active');
            showCode(labData[key]);
        };
        list.appendChild(li);
    });
}

function showCode(data) {
    document.getElementById('prog-title').innerText = data.title;
    document.getElementById('code-block').innerText = data.code;
    document.getElementById('logic-text').innerHTML = data.logic;
}

function copyCode() {
    navigator.clipboard.writeText(document.getElementById('code-block').innerText).then(() => alert("Copied!"));
}

window.onload = () => { initSidebar(); document.querySelector('.lab-item').click(); };
</script>
</body>
</html>
