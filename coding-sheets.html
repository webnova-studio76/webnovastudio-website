<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Cheat Sheets | Code Craft Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6; /* Developer Blue */
            --bg: #f8fafc;
            --white: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); }

        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }

        /* --- Header --- */
        .library-header { text-align: center; margin-bottom: 40px; }
        .sheet-badge { 
            background: #eff6ff; color: var(--primary); padding: 4px 12px; 
            border-radius: 4px; font-size: 0.7rem; font-weight: 800; 
            border: 1px solid #dbeafe; margin-bottom: 10px; display: inline-block;
        }
        .library-header h1 { font-size: 2.2rem; color: #0f172a; margin-bottom: 10px; }
        .library-header h1 span { color: var(--primary); }

        /* --- Toolbar --- */
        .toolbar {
            background: var(--white); padding: 15px 25px; border-radius: 12px;
            border: 1px solid var(--border); display: flex; justify-content: space-between;
            align-items: center; gap: 20px; margin-bottom: 30px;
        }

        .search-box { flex: 2; position: relative; }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        .search-box input {
            width: 100%; padding: 10px 10px 10px 45px; border-radius: 8px;
            border: 1px solid var(--border); background: #ffffff; outline: none;
        }

        /* --- 5-Column Grid --- */
        .asset-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }

        .sheet-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            padding: 15px;
            align-items: center;
            height: 90px;
            transition: 0.2s ease-in-out;
            text-decoration: none;
            position: relative;
        }

        .sheet-card:hover {
            border-color: var(--primary);
            background: #fdfdfd;
            box-shadow: 4px 4px 0px rgba(59, 130, 246, 0.1);
        }

        .thumb {
            width: 45px; height: 45px; background: #0f172a;
            border-radius: 6px; display: flex; align-items: center;
            justify-content: center; font-size: 1.1rem; color: var(--primary);
            flex-shrink: 0;
        }

        .info { margin-left: 12px; flex-grow: 1; overflow: hidden; }
        .info h3 { font-size: 0.85rem; color: #0f172a; margin-bottom: 4px; font-weight: 700; }
        
        .meta { display: flex; gap: 8px; font-size: 0.65rem; font-weight: 600; color: #64748b; }
        .meta b { color: var(--primary); }

        /* PDF Icon Tag */
        .pdf-tag {
            position: absolute; top: 10px; right: 10px;
            font-size: 0.7rem; color: #ef4444; /* PDF Red */
        }

        @media (max-width: 1300px) { .asset-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 800px) { .asset-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .asset-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header class="library-header">
        <span class="sheet-badge"><i class="fas fa-terminal"></i> Syntax Quick-Ref</span>
        <h1>Coding <span>Cheat</span> Sheets</h1>
        <p>Master technical logic with concise PDF guides from Code Craft Academy.</p>
    </header>

    <div class="toolbar">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Find a language (Python, React, SQL)...">
        </div>
        <div style="font-size: 0.75rem; font-weight: 700; color: #64748b;">
            <i class="fas fa-file-pdf"></i> High-Res PDF
        </div>
    </div>

    <div class="asset-grid">
        <a href="pdfs/python-core.pdf" download class="sheet-card">
            <div class="pdf-tag"><i class="fas fa-file-pdf"></i></div>
            <div class="thumb"><i class="fab fa-python"></i></div>
            <div class="info">
                <h3>Python Core</h3>
                <div class="meta"><span><b>v3.12</b></span><span>2 Pages</span></div>
            </div>
        </a>

        <a href="pdfs/react-hooks.pdf" download class="sheet-card">
            <div class="pdf-tag"><i class="fas fa-file-pdf"></i></div>
            <div class="thumb"><i class="fab fa-react"></i></div>
            <div class="info">
                <h3>React Hooks</h3>
                <div class="meta"><span><b>Essentials</b></span><span>1 Page</span></div>
            </div>
        </a>

        <a href="pdfs/sql-queries.pdf" download class="sheet-card">
            <div class="pdf-tag"><i class="fas fa-file-pdf"></i></div>
            <div class="thumb"><i class="fas fa-database"></i></div>
            <div class="info">
                <h3>SQL Mastery</h3>
                <div class="meta"><span><b>Queries</b></span><span>3 Pages</span></div>
            </div>
        </a>

        <a href="pdfs/css-grid.pdf" download class="sheet-card">
            <div class="pdf-tag"><i class="fas fa-file-pdf"></i></div>
            <div class="thumb"><i class="fas fa-th"></i></div>
            <div class="info">
                <h3>CSS Grid</h3>
                <div class="meta"><span><b>Layouts</b></span><span>1 Page</span></div>
            </div>
        </a>

        <a href="pdfs/js-es6.pdf" download class="sheet-card">
            <div class="pdf-tag"><i class="fas fa-file-pdf"></i></div>
            <div class="thumb"><i class="fab fa-js"></i></div>
            <div class="info">
                <h3>JS ES6+</h3>
                <div class="meta"><span><b>Modern</b></span><span>2 Pages</span></div>
            </div>
        </a>
    </div>
</div>
<script src="header.js"></script>
<script src="footer.js"></script>
<script src="animations.js"></script>
</body>
</html>
