<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Cheat Sheets | Code Craft Academic</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ==========================================================================
           1. COMPONENT-LEVEL PALETTE DICTIONARY & ANTI-BLUR OVERRIDES
           ========================================================================== */
        :root {
            --primary: #3b82f6;        /* Developer Blue */
            --primary-glow: rgba(59, 130, 246, 0.25);
            --secondary: #090d16;      /* Deep Space Dark Matte */
            --card-surface: #111827;   /* High-Contrast Charcoal Slate */
            --bg: #030712;             /* True Obsidian Background Canvas */
            --white: #ffffff;
            --text-main: #cbd5e1;      /* Anti-Halation Off-White Text */
            --text-muted: #94a3b8;     /* Muted Cool Gray Details */
            --border: rgba(255, 255, 255, 0.05);
            --code-terminal: #070a12;  /* Inset Console Field Base */
            --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            
            /* Shadows Configuration */
            --tactile-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            --hover-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.8), 0 0 20px -2px var(--primary-glow), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            line-height: 1.7;
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 10; }

        /* ==========================================================================
           2. SKEUOMORPHIC BRAND TITLE HEADER
           ========================================================================== */
        .library-header { 
            text-align: center; 
            margin-bottom: 40px; 
            padding: 50px 40px;
            background: linear-gradient(135deg, var(--card-surface) 0%, var(--secondary) 100%);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--tactile-shadow);
        }
        .sheet-badge { 
            background: rgba(59, 130, 246, 0.1); 
            color: #60a5fa; 
            padding: 6px 16px; 
            border-radius: 50px; 
            font-size: 0.75rem; 
            font-weight: 800; 
            border: 1px solid rgba(59, 130, 246, 0.2); 
            margin-bottom: 15px; 
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .library-header h1 { font-size: 2.5rem; font-weight: 900; color: var(--white); margin-bottom: 10px; letter-spacing: -0.02em; }
        .library-header h1 span { color: var(--primary); text-shadow: 0 0 25px var(--primary-glow); }
        .library-header p { color: var(--text-muted); font-size: 1.05rem; font-weight: 500; }

        /* ==========================================================================
           3. MATRIX MULTI-COLUMN CONSOLE PANELS (Cards & Viewer Side-by-Side)
           ========================================================================== */
        .workspace-split {
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        .cards-column { display: flex; flex-direction: column; gap: 15px; }

        .sheet-card {
            background: linear-gradient(135deg, var(--card-surface) 0%, #1f2937 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            padding: 20px;
            align-items: center;
            height: 95px;
            transition: var(--transition);
            text-decoration: none;
            position: relative;
            box-shadow: var(--tactile-shadow);
            cursor: pointer;
        }
        .sheet-card:hover, .sheet-card.active {
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateX(4px);
            box-shadow: var(--hover-shadow);
        }

        .thumb {
            width: 50px; height: 56px; background: var(--code-terminal);
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-size: 1.4rem; color: var(--primary);
            flex-shrink: 0; border: 1px solid var(--border);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .sheet-card:hover .thumb, .sheet-card.active .thumb { color: var(--white); background: var(--primary); border-color: var(--primary); }

        .info { margin-left: 16px; flex-grow: 1; overflow: hidden; }
        .info h3 { font-size: 1.05rem; color: var(--white); margin-bottom: 4px; font-weight: 800; letter-spacing: -0.01em; }
        .meta { display: flex; gap: 12px; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); }
        .meta b { color: var(--primary); }

        .pdf-tag { position: absolute; top: 15px; right: 15px; font-size: 0.85rem; color: #f87171; }

        /* ==========================================================================
           4. LIVE CHEATSHEET EMBED VIEWER TERMINAL CONSOLE
           ========================================================================== */
        .live-viewer-console {
            background: linear-gradient(135deg, var(--card-surface) 0%, var(--secondary) 100%);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--tactile-shadow);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: sticky;
            top: 40px;
            height: calc(100vh - 120px);
            min-height: 550px;
        }

        .viewer-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 25px;
        }
        .viewer-title-block { display: flex; align-items: center; gap: 14px; }
        .viewer-title-block i { font-size: 1.6rem; color: var(--primary); }
        .viewer-title-block h2 { font-size: 1.5rem; font-weight: 800; color: var(--white); letter-spacing: -0.02em; }
        
        /* Interactive Action Tokens */
        .btn-action-download {
            background: var(--primary); color: var(--white); padding: 12px 28px;
            border-radius: 12px; text-decoration: none; font-weight: 800; font-size: 0.85rem;
            display: flex; align-items: center; gap: 10px; transition: var(--transition);
            box-shadow: 0 4px 14px var(--primary-glow); border: none; cursor: pointer;
        }
        .btn-action-download:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 8px 22px rgba(59, 130, 246, 0.4); }

        /* Embedded Dynamic Code Console Display */
        .terminal-viewport {
            background: var(--code-terminal);
            border: 1px solid rgba(255,255,255,0.02);
            border-radius: 14px;
            padding: 25px;
            flex-grow: 1;
            overflow-y: auto;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.92rem;
            line-height: 1.65;
            color: #cbd5e1;
            box-shadow: inset 0 3px 10px rgba(0,0,0,0.6);
        }
        .terminal-viewport pre { white-space: pre-wrap; word-break: break-all; }

        /* Syntax Highlighter Classes */
        .sc-comment { color: #5c6370; font-style: italic; display: block; margin-bottom: 4px; }
        .sc-keyword { color: #f43f5e; font-weight: 700; }
        .sc-method { color: #61afef; }
        .sc-string { color: #98c379; }
        .sc-args { color: #d19a66; }

        @media (max-width: 1100px) {
            .workspace-split { grid-template-columns: 1fr; }
            .live-viewer-console { height: auto; position: relative; top: 0; min-height: auto; }
        }
        @media (max-width: 600px) {
            .library-header h1 { font-size: 2rem; }
            .live-viewer-console { padding: 25px; }
            .viewer-header { flex-direction: column; align-items: flex-start; gap: 20px; }
            .btn-action-download { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="container">
    
    <header class="library-header">
        <span class="sheet-badge"><i class="fas fa-terminal"></i> Syntax Quick-Ref</span>
        <h1>Coding <span>Cheat</span> Sheets</h1>
        <p>Master technical logic with high-performance operational consoles from Code Craft Academy.</p>
    </header>

    <div class="workspace-split">
        
        <div class="cards-column">
            
            <div class="sheet-card active" onclick="loadCheatSheet('python')">
                <div class="pdf-tag"><i class="fas fa-file-pdf"></i></div>
                <div class="thumb"><i class="fab fa-python"></i></div>
                <div class="info">
                    <h3>Python Core</h3>
                    <div class="meta"><span><b>v3.12</b></span><span>2 Pages</span></div>
                </div>
            </div>

            <div class="sheet-card" onclick="loadCheatSheet('react')">
                <div class="pdf-tag"><i class="fas fa-file-pdf"></i></div>
                <div class="thumb"><i class="fab fa-react"></i></div>
                <div class="info">
                    <h3>React Hooks</h3>
                    <div class="meta"><span><b>Essentials</b></span><span>1 Page</span></div>
                </div>
            </div>

            <div class="sheet-card" onclick="loadCheatSheet('sql')">
                <div class="pdf-tag"><i class="fas fa-file-pdf"></i></div>
                <div class="thumb"><i class="fas fa-database"></i></div>
                <div class="info">
                    <h3>SQL Mastery</h3>
                    <div class="meta"><span><b>Queries</b></span><span>3 Pages</span></div>
                </div>
            </div>

            <div class="sheet-card" onclick="loadCheatSheet('css')">
                <div class="pdf-tag"><i class="fas fa-file-pdf"></i></div>
                <div class="thumb"><i class="fas fa-th"></i></div>
                <div class="info">
                    <h3>CSS Grid</h3>
                    <div class="meta"><span><b>Layouts</b></span><span>1 Page</span></div>
                </div>
            </div>
            
        </div>

        <div class="live-viewer-console">
            <div class="viewer-header">
                <div class="viewer-title-block">
                    <i id="viewer-icon" class="fab fa-python"></i>
                    <h2 id="viewer-title">Python Core Cheat Sheet</h2>
                </div>
                <a id="viewer-download-trigger" href="pdfs/python-core.pdf" download class="btn-action-download">
                    <i class="fas fa-cloud-download-alt"></i> Download High-Res PDF
                </a>
            </div>

            <div class="terminal-viewport">
                <pre id="terminal-pre"></pre>
            </div>
        </div>

    </div>
</div>

<script>
    /* ==========================================================================
       DYNAMIC RUNTIME CHEATSHEET HARDWARE DEFINITION DICTIONARY
       ========================================================================== */
    const cheatSheetRepository = {
        python: {
            title: "Python Core Cheat Sheet",
            icon: "fab fa-python",
            download: "pdfs/python-core.pdf",
            code: `<span class="sc-comment"># 1. Lambda Functions & Quick Logic Mapping</span>
<span class="sc-keyword">square</span> = <span class="sc-keyword">lambda</span> x: x ** <span class="sc-args">2</span>
<span class="sc-method">print</span>(<span class="sc-keyword">square</span>(<span class="sc-args">5</span>)) <span class="sc-comment"># Output: 25</span>

<span class="sc-comment"># 2. Advanced List Comprehensions</span>
numbers = [<span class="sc-args">1</span>, <span class="sc-args">2</span>, <span class="sc-args">3</span>, <span class="sc-args">4</span>, <span class="sc-args">5</span>]
evens = [x <span class="sc-keyword">for</span> x <span class="sc-keyword">in</span> numbers <span class="sc-keyword">if</span> x % <span class="sc-args">2</span> == <span class="sc-args">0</span>]

<span class="sc-comment"># 3. Dictionary Comprehension Matrix</span>
square_dict = {x: x**<span class="sc-args">2</span> <span class="sc-keyword">for</span> x <span class="sc-keyword">in</span> <span class="sc-method">range</span>(<span class="sc-args">5</span>)}`
        },
        react: {
            title: "React Hooks Cheat Sheet",
            icon: "fab fa-react",
            download: "pdfs/react-hooks.pdf",
            code: `<span class="sc-comment">// 1. State hook deployment structure</span>
<span class="sc-keyword">const</span> [count, setCount] = <span class="sc-method">useState</span>(<span class="sc-args">0</span>);

<span class="sc-comment">// 2. Lifecycle synchronization with useEffect</span>
<span class="sc-method">useEffect</span>(() => {
    <span class="sc-method">document</span>.title = <span class="sc-string">\`Count Trace: \${count}\`</span>;
}, [count]); <span class="sc-comment">// Only runs when dependency array transforms</span>

<span class="sc-comment">// 3. Performance tracking with useMemo caching mechanics</span>
<span class="sc-keyword">const</span> memoizedValue = <span class="sc-method">useMemo</span>(() => <span class="sc-method">expensiveCalculation</span>(data), [data]);`
        },
        sql: {
            title: "SQL Mastery Cheat Sheet",
            icon: "fas fa-database",
            download: "pdfs/sql-queries.pdf",
            code: `<span class="sc-comment">-- 1. Aggregations & Conditional Matrix Sorting</span>
<span class="sc-keyword">SELECT</span> department_id, <span class="sc-method">COUNT</span>(*), <span class="sc-method">AVG</span>(salary)
<span class="sc-keyword">FROM</span> corporate_ledger_employees
<span class="sc-keyword">WHERE</span> status = <span class="sc-string">'Active'</span>
<span class="sc-keyword">GROUP BY</span> department_id
<span class="sc-keyword">HAVING</span> <span class="sc-method">AVG</span>(salary) > <span class="sc-args">55000</span>;

<span class="sc-comment">-- 2. Multi-Table Join Frameworks</span>
<span class="sc-keyword">SELECT</span> e.name, d.dept_name
<span class="sc-keyword">FROM</span> employees e
<span class="sc-keyword">INNER JOIN</span> departments d <span class="sc-keyword">ON</span> e.dept_id = d.id;`
        },
        css: {
            title: "CSS Grid Cheat Sheet",
            icon: "fas fa-th",
            download: "pdfs/css-grid.pdf",
            code: `<span class="sc-comment">/* 1. Definitive Parent Layout Canvas Blueprint */</span>
<span class="sc-method">.matrix-grid-container</span> {
    <span class="sc-keyword">display</span>: grid;
    <span class="sc-keyword">grid-template-columns</span>: <span class="sc-method">repeat</span>(auto-fit, <span class="sc-method">minmax</span>(<span class="sc-args">280px</span>, <span class="sc-args">1fr</span>));
    <span class="sc-keyword">gap</span>: <span class="sc-args">24px</span>;
}

<span class="sc-comment">/* 2. Micro-placement span alignment overrides */</span>
<span class="sc-method">.wide-span-column</span> {
    <span class="sc-keyword">grid-column</span>: span <span class="sc-args">2</span>;
    <span class="sc-keyword">grid-row</span>: <span class="sc-args">1</span> / <span class="sc-args">3</span>;
}`
        }
    };

    /* ==========================================================================
       INTERACTIVE RUNTIME RENDERING CONTROLLER ENGINE
       ========================================================================== */
    function loadCheatSheet(key) {
        // Toggle Active Frame Selection Styles
        document.querySelectorAll('.sheet-card').forEach(card => card.classList.remove('active'));
        const eventSource = event ? event.currentTarget : null;
        if(eventSource) eventSource.classList.add('active');

        // Fetch Targeted Repository Metrics
        const targetData = cheatSheetRepository[key];
        
        // Render Metric Updates Straight into Console Viewport
        document.getElementById('viewer-title').innerText = targetData.title;
        document.getElementById('viewer-icon').className = targetData.icon;
        document.getElementById('viewer-download-trigger').setAttribute('href', targetData.download);
        document.getElementById('terminal-pre').innerHTML = targetData.code;
    }

    // Initialize Default Runtime Template Allocation Frame
    loadCheatSheet('python');
</script>

<script src="header.js"></script>
<script src="footer.js"></script>
<script src="animations.js"></script>
</body>
</html>
