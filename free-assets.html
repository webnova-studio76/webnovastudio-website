<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Website Downloads | WebNova Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5; /* Indigo */
            --success: #10b981; /* Success Green */
            --bg: #f8fafc;
            --white: #ffffff;
            --text: #334155;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); }

        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }

        /* --- Header --- */
        .library-header { text-align: center; margin-bottom: 40px; }
        .free-badge { 
            background: var(--success); color: white; padding: 4px 12px; 
            border-radius: 20px; font-size: 0.7rem; font-weight: 900; 
            text-transform: uppercase; margin-bottom: 10px; display: inline-block;
        }
        .library-header h1 { font-size: 2.5rem; color: #0f172a; }
        .library-header h1 span { color: var(--primary); }

        /* --- Search & Sort Toolbar --- */
        .toolbar {
            background: var(--white); padding: 15px 25px; border-radius: 50px;
            border: 1px solid var(--border); display: flex; justify-content: space-between;
            align-items: center; gap: 20px; margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .search-box { flex: 2; position: relative; }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        .search-box input {
            width: 100%; padding: 10px 10px 10px 45px; border-radius: 30px;
            border: 1px solid transparent; background: #f1f5f9; outline: none; transition: 0.3s;
        }
        .search-box input:focus { background: white; border-color: var(--primary); }

        /* --- Compact 5-Column Grid --- */
        .asset-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }

        .asset-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            padding: 12px;
            align-items: center;
            height: 95px;
            transition: 0.3s ease;
            position: relative;
        }

        .asset-card:hover {
            transform: translateY(-3px);
            border-color: var(--success);
            box-shadow: 0 10px 15px rgba(16, 185, 129, 0.1);
        }

        /* Free Corner Ribbon */
        .free-ribbon {
            position: absolute; top: 0; right: 0;
            background: var(--success); color: white;
            font-size: 0.5rem; font-weight: 900; padding: 2px 8px;
            border-radius: 0 12px 0 12px;
        }

        .thumb {
            width: 50px; height: 50px; background: #ecfdf5;
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-size: 1.3rem; color: var(--success);
            flex-shrink: 0;
        }

        .info { margin-left: 12px; flex-grow: 1; overflow: hidden; }
        .info h3 { font-size: 0.85rem; color: #0f172a; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .meta { display: flex; gap: 8px; font-size: 0.65rem; font-weight: 700; color: #94a3b8; }
        .meta b { color: var(--success); }

        .actions { display: flex; gap: 6px; margin-top: 8px; }
        .btn-act {
            font-size: 0.6rem; font-weight: 800; text-transform: uppercase;
            padding: 4px 10px; border-radius: 4px; text-decoration: none; transition: 0.2s;
        }
        .btn-demo { background: #f0fdf4; color: var(--success); }
        .btn-zip { background: #f1f5f9; color: #475569; }
        .btn-demo:hover { background: var(--success); color: white; }

        @media (max-width: 1300px) { .asset-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 1000px) { .asset-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .asset-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header class="library-header">

    <div class="asset-grid" id="freeGrid">

                <div class="actions">

        <div class="asset-card">

                <div class="meta">

                </div>
                <div class="actions">
                    <a href="#" class="btn-act btn-demo">Demo</a>
                    <a href="#" class="btn-act btn-zip">Get Free ZIP</a>

</div>

</body>
</html>
