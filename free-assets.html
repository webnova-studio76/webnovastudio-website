<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Template Vault | WebNova Academy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        :root {
            --primary: #6366f1; /* Modern Indigo */
            --success: #10b981;
            --bg: #0f172a; /* Deep Dark Background for Premium feel */
            --card-bg: #1e293b;
            --white: #ffffff;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border: rgba(255,255,255,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); overflow-x: hidden; }

        .container { max-width: 1600px; margin: 0 auto; padding: 60px 20px; }

        /* --- Luxury Header --- */
        .library-header { text-align: center; margin-bottom: 60px; }
        .library-header h1 { font-size: 3rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 15px; }
        .library-header h1 span { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .library-header p { color: var(--text-dim); font-size: 1.1rem; max-width: 600px; margin: 0 auto; }

        /* --- Sleek Toolbar --- */
        .toolbar {
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px);
            padding: 12px 25px; border-radius: 100px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            gap: 20px; margin-bottom: 50px; position: sticky; top: 20px; z-index: 100;
        }

        .search-box { flex: 2; position: relative; }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        .search-box input {
            width: 100%; padding: 12px 45px; border-radius: 100px;
            border: 1px solid transparent; background: rgba(15, 23, 42, 0.5); 
            color: white; outline: none; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--primary); background: rgba(15, 23, 42, 0.8); }

        /* --- The 5-Column Premium Grid --- */
        .asset-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }

        .asset-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column; /* Vertical stacked for better image view */
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .asset-card:hover {
            transform: translateY(-10px);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* Better Thumbnail Styling */
        .thumb-wrapper {
            width: 100%;
            height: 140px; /* Perfect height for card proportions */
            position: relative;
            overflow: hidden;
            background: #000;
        }

        .thumb-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: 0.5s ease;
        }

        .asset-card:hover .thumb-img {
            transform: scale(1.1) rotate(2deg);
            opacity: 1;
        }

        .play-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3); opacity: 0; transition: 0.3s;
        }
        .asset-card:hover .play-overlay { opacity: 1; }
        .play-overlay i { font-size: 2.5rem; color: white; text-shadow: 0 0 20px rgba(99, 102, 241, 0.8); }

        .info { padding: 15px; }
        .info h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 8px; color: var(--text-main); }
        
        .meta { display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 600; color: var(--text-dim); margin-bottom: 15px; }
        .meta b { color: var(--success); }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-act {
            font-size: 0.7rem; font-weight: 700; text-align: center;
            padding: 8px; border-radius: 8px; text-decoration: none; transition: 0.2s;
        }
        .btn-demo { background: var(--primary); color: white; }
        .btn-zip { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .btn-zip:hover { background: white; color: black; }

        /* Video Modal Styles remain the same but darker... */
        .video-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 100000;
        }
        .video-container { width: 90%; max-width: 1000px; aspect-ratio: 16/9; }
        .video-container iframe { width: 100%; height: 100%; border-radius: 20px; box-shadow: 0 0 50px rgba(99, 102, 241, 0.3); }

        /* Responsive */
        @media (max-width: 1400px) { .asset-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 1000px) { .asset-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .asset-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header class="library-header">
        <h1><span>Premium</span> Asset Vault</h1>
        <p>Production-ready templates for modern developers. Watch the breakdown and grab the source code.</p>
    </header>

    <div class="toolbar">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="libSearch" placeholder="Search templates...">
        </div>
        <div style="font-size: 0.85rem; font-weight: 700; color: var(--success);">
            <i class="fas fa-shield-alt"></i> 2026 Industry Standards
        </div>
    </div>

    <div class="asset-grid" id="assetGrid">
        
        <div class="asset-card">
            <div class="thumb-wrapper">
                <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=500&q=80" alt="Hospital Preview" class="thumb-img">
                <div class="play-overlay" onclick="openVideo('dQw4w9WgXcQ')">
                    <i class="fas fa-play-circle"></i>
                </div>
            </div>
            <div class="info">
                <h3>City Care Hospital v2</h3>
                <div class="meta">
                    <span><i class="fas fa-download"></i> <b>1.8k</b></span>
                    <span><i class="fas fa-bolt"></i> OPTIMIZED</span>
                </div>
                <div class="actions">
                    <a href="javascript:void(0)" onclick="openVideo('dQw4w9WgXcQ')" class="btn-act btn-demo">Watch Demo</a>
                    <a href="#" class="btn-act btn-zip">Download</a>
                </div>
            </div>
        </div>

        </div>
</div>

<div id="videoModal" class="video-overlay" onclick="closeVideo()">
    <div class="video-container">
        <iframe id="videoPlayer" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
</div>

<script>
    function openVideo(videoId) {
        const modal = document.getElementById('videoModal');
        const player = document.getElementById('videoPlayer');
        player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
        modal.style.display = 'flex';
    }

    function closeVideo() {
        const modal = document.getElementById('videoModal');
        const player = document.getElementById('videoPlayer');
        modal.style.display = 'none';
        player.src = "";
    }
</script>
<script src="header.js"></script>
<script src="footer.js"></script>
<script src="animations.js"></script>
</body>
</html>
